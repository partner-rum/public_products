<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Структурные продукты</title>
<meta name="description" content="Структурные продукты: дайджест инвестидей, текущие продукты и размещённые выпуски.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --wine: #33121C; --wine2: #3D1522;
    --ink-l: #F5EDE4; --fog-l: #B99AA3; --dim: #8A6B76;
    --gold: #C09246; --gold-l: #D9BE85;
    --hair: #4A2533;
    --up: #7FB89A; --down: #D98A80;
    --f-disp: 'Prata', Georgia, serif;
    --f-body: 'Onest', system-ui, sans-serif;
    --f-mono: 'JetBrains Mono', Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: linear-gradient(168deg, var(--wine) 0%, var(--wine2) 100%); min-height: 100dvh; color: var(--ink-l); font-family: var(--f-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { text-decoration: none; color: inherit; cursor: pointer; }
  a:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; border-radius: 4px; }

  /* Тикерная лента */
  .tape { border-bottom: 1px solid var(--hair); overflow: hidden; white-space: nowrap; padding: 11px 0; position: relative; }
  .tape-in { display: inline-block; animation: tape 55s linear infinite; }
  .tq { font-family: var(--f-mono); font-size: 11.5px; letter-spacing: 0.04em; color: var(--dim); margin-right: 34px; }
  .tq b { color: var(--fog-l); font-weight: 500; }
  .tq .u { color: var(--up); } .tq .d { color: var(--down); }
  @keyframes tape { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .scene { min-height: calc(100dvh - 40px); display: flex; flex-direction: column; max-width: 1100px; margin: 0 auto; padding: 26px 44px; position: relative; }
  .top { display: flex; align-items: center; gap: 11px; }
  .top .name { font-size: 14px; font-weight: 600; color: var(--fog-l); }

  .menu { margin: auto 0; padding: 40px 0; display: flex; flex-direction: column; gap: 6px; z-index: 1; }
  .item { display: block; position: relative; width: fit-content; }
  .item .t { font-family: var(--f-disp); font-size: clamp(40px, 7.6vw, 92px); line-height: 1.12; color: var(--ink-l); transition: color .25s; }
  .item .m { position: absolute; left: 102%; bottom: 22%; white-space: nowrap; font-family: var(--f-mono); font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); opacity: 0; transform: translateX(-10px); transition: opacity .25s, transform .25s; }
  .item:hover .t, .item:focus-visible .t { color: var(--gold-l); }
  .item:hover .m, .item:focus-visible .m { opacity: 1; transform: none; }

  /* Фоновый глиф справа — меняется по hover */
  .stage { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: min(40vw, 470px); opacity: 0; transition: opacity .35s; pointer-events: none; z-index: 0; }
  .stage.show { opacity: 0.22; }
  .stage path { stroke-dasharray: 900; stroke-dashoffset: 900; }
  .stage.show path { animation: drawp .9s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes drawp { to { stroke-dashoffset: 0; } }

  .foot { padding-top: 20px; display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-size: 11.5px; color: var(--dim); }
  .foot .mono { font-family: var(--f-mono); }

  .rise { opacity: 0; transform: translateY(20px); animation: rise .7s cubic-bezier(.2,.7,.3,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .tape-in { animation: none; }
    .rise { animation: none; opacity: 1; transform: none; }
    .item .t, .item .m { transition: none; }
    .stage, .stage.show { opacity: 0; }
  }
  @media (max-width: 760px) {
    .scene { padding: 22px 20px; }
    .item .m { position: static; display: block; opacity: 1; transform: none; margin: 2px 0 10px; }
    .stage { display: none; }
  }
</style>
</head>
<body>

<div class="tape" aria-hidden="true"><div class="tape-in" id="tape"></div></div>

<div class="scene">
  <div class="top rise">
    <svg width="24" height="24" viewBox="0 0 26 26" fill="none" aria-hidden="true">
      <path d="M13 1 L15.6 10.4 L25 13 L15.6 15.6 L13 25 L10.4 15.6 L1 13 L10.4 10.4 Z" fill="#C09246"/>
    </svg>
    <span class="name">Структурные продукты</span>
  </div>

  <svg class="stage" id="stage" viewBox="0 0 470 300" aria-hidden="true">
    <path id="stage-path" d="" fill="none" stroke="#D9BE85" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <nav class="menu" aria-label="Разделы">
    <a class="item rise" style="animation-delay:.10s" href="digest.html" data-g="M20 250 L150 250 L300 90 L450 90">
      <span class="t">Дайджест</span>
      <span class="m" id="m-digest">идеи недели</span>
    </a>
    <a class="item rise" style="animation-delay:.20s" href="board.html?type=warrant" data-g="M20 260 L90 200 L160 230 L240 120 L320 160 L450 40">
      <span class="t">Продукты</span>
      <span class="m" id="m-board">живые котировки</span>
    </a>
    <a class="item rise" style="animation-delay:.30s" href="placements.html" data-g="M20 230 L140 230 L140 150 L300 150 L300 190 L450 190">
      <span class="t">Выпуски</span>
      <span class="m" id="m-place">размещения</span>
    </a>
    <a class="item rise" style="animation-delay:.40s" href="index.html#families" data-g="M20 250 L170 250 L330 70 L450 70 M330 70 L450 190">
      <span class="t">Об устройстве</span>
      <span class="m">три семейства</span>
    </a>
  </nav>

  <div class="foot rise" style="animation-delay:.52s">
    <span>Не является индивидуальной инвестиционной рекомендацией.</span>
    <span class="mono" id="upd"></span>
  </div>
</div>

<script src="data/instruments.js"></script>
<script src="data/digest.js"></script>
<script src="data/placements.js"></script>
<script>
  const fmt2 = n => n.toFixed(2).replace(".", ",");
  const fmt1 = n => n.toFixed(1).replace(".", ",");

  // Тикер: реальные котировки с доски (лента дублируется для бесшовного цикла)
  try {
    const list = window.SITE_DATA.instruments;
    const chunk = list.map(r => {
      const up = r.chg > 0;
      return '<span class="tq"><b>' + r.id + '</b> ' + fmt2(r.quote) + '% <span class="' + (up ? "u" : "d") + '">' +
        (up ? "+" : "−") + fmt1(Math.abs(r.chg)) + '</span></span>';
    }).join("");
    document.getElementById("tape").innerHTML = chunk + chunk;

    document.getElementById("m-digest").textContent = "идеи от " + window.DIGEST.date;
    document.getElementById("m-board").textContent = list.length + " инструментов";
    document.getElementById("m-place").textContent = window.PLACEMENTS_DATA.issues.length + " выпуска";
    const u = window.SITE_DATA.updated;
    if (u) document.getElementById("upd").textContent = "данные: " + u.split("-").reverse().join(".");
  } catch (e) {}

  // Фоновый глиф пэйоффа при наведении на пункт меню
  (function () {
    const stage = document.getElementById("stage");
    const path = document.getElementById("stage-path");
    document.querySelectorAll(".item").forEach(a => {
      const show = () => {
        path.setAttribute("d", a.getAttribute("data-g"));
        stage.classList.remove("show");
        void stage.getBoundingClientRect();
        stage.classList.add("show");
      };
      a.addEventListener("mouseenter", show);
      a.addEventListener("focus", show);
      a.addEventListener("mouseleave", () => stage.classList.remove("show"));
      a.addEventListener("blur", () => stage.classList.remove("show"));
    });
  })();
</script>
</body>
</html>
