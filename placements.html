<style>
  :root {
    --canvas: #0B0C10; --card: #14161C; --panel-2: #191B22; --tile: rgba(255,255,255,0.045);
    --black: #1A1919;
    --ink: #F2F3F7; --hushed: rgba(242,243,247,0.64); --faint: rgba(242,243,247,0.42);
    --border: rgba(255,255,255,0.11); --border-soft: rgba(255,255,255,0.07);
    --solar: #EE7D1B; --solar-l: #F58E33;
    --up: #55C08A; --down: #EE7D1B;
    --f-body: 'Onest', system-ui, sans-serif;
    --f-mono: 'JetBrains Mono', Consolas, monospace;
    --display: 'Rubik', 'Onest', system-ui, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--ink); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 4px; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 44px 40px; }

  .nav { position: sticky; top: 0; z-index: 20; background: rgba(11,12,16,0.82); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav-in { max-width: 1280px; margin: 0 auto; padding: 0 44px; height: 62px; display: flex; align-items: center; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-name { font-size: 14.5px; font-weight: 600; }
  .topnav { margin-left: auto; display: flex; align-items: center; gap: 22px; font-size: 14px; font-weight: 500; }
  .topnav a { color: var(--hushed); transition: color .2s; }
  .topnav a:hover { color: var(--ink); }
  .topnav a[aria-current="page"] { color: var(--ink); font-weight: 600; }
  .btn-solar { background: var(--solar); color: #0C0A08 !important; border-radius: 6px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 7px; transition: background .3s ease-in-out; }
  .btn-solar:hover { background: var(--solar-l); }

  .head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin: 26px 0 18px; }
  h1 { margin: 0; font-family: var(--display); font-size: 30px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; }
  .count { font-family: var(--f-mono); font-size: 12px; color: var(--hushed); }

  .layout { display: grid; grid-template-columns: 400px minmax(0, 1fr); gap: 20px; align-items: start; }

  .aside { position: sticky; top: 78px; display: flex; flex-direction: column; max-height: calc(100dvh - 100px); }
  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .search { width: 100%; border: 1px solid var(--border); border-radius: 6px; background: var(--card); padding: 10px 12px; font-family: var(--f-body); font-size: 14px; color: var(--ink); }
  .search::placeholder { color: var(--faint); }
  .search:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
  .chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .kf { border: 1px solid var(--border); background: var(--card); border-radius: 6px; padding: 6px 12px; font-size: 12.5px; font-weight: 500; color: var(--hushed); cursor: pointer; font-family: var(--f-body); }
  .kf:hover { color: var(--ink); }
  .kf.active { background: rgba(238,125,27,0.16); border-color: var(--solar); color: var(--ink); font-weight: 600; }
  .kf .n { font-family: var(--f-mono); font-size: 10.5px; opacity: 0.75; margin-left: 4px; }
  .matured-toggle { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--hushed); cursor: pointer; user-select: none; margin-left: auto; }
  .matured-toggle input { accent-color: var(--solar); width: 14px; height: 14px; cursor: pointer; }

  .list { background: var(--card); border: 1px solid var(--border-soft); border-radius: 12px; overflow-y: auto; flex: 1; min-height: 0; }
  .group-h { display: flex; align-items: center; gap: 9px; width: 100%; border: none; border-top: 1px solid var(--border-soft); background: var(--panel-2); cursor: pointer; font-family: var(--f-body); color: var(--ink); padding: 11px 14px; text-align: left; position: sticky; top: 0; z-index: 2; }
  .group-h:first-child { border-top: none; }
  .group-h .chev { transition: transform .2s var(--ease); color: var(--hushed); font-size: 11px; }
  .group-h.open .chev { transform: rotate(90deg); }
  .group-h .name { font-size: 13.5px; font-weight: 600; }
  .group-h .gc { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--hushed); }
  .group-items { display: none; }
  .group-items.open { display: block; }
  .item { display: block; width: 100%; text-align: left; border: none; border-top: 1px solid rgba(255,255,255,0.07); border-left: 3px solid transparent; background: transparent; cursor: pointer; font-family: var(--f-body); color: var(--ink); padding: 10px 14px 10px 12px; }
  .item:hover { background: rgba(255,255,255,0.05); }
  .item.active { background: rgba(255,255,255,0.05); border-left-color: var(--solar); }
  .item .r1 { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .serial { font-size: 13.5px; font-weight: 600; }
  .item .param { font-family: var(--f-mono); font-size: 11.5px; color: var(--hushed); white-space: nowrap; }
  .doc-link { display: flex; align-items: center; gap: 10px; padding: 10px 13px; margin-top: 8px; background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; color: #F2F3F7; font-size: 13.5px; text-decoration: none; transition: background .2s; }
  .doc-link:hover { background: rgba(255,255,255,0.08); }
  .doc-link svg { flex: none; }
  .item .r2 { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-top: 3px; }
  .item .isin { font-family: var(--f-mono); font-size: 10.5px; color: rgba(255,255,255,0.44); }
  .item .perf { font-family: var(--f-mono); font-size: 11.5px; font-weight: 600; }
  .item.matured .serial { color: rgba(255,255,255,0.44); }
  .empty-list { padding: 22px 14px; font-size: 13px; color: var(--faint); }

  .panel-wrap { position: sticky; top: 78px; }
  .panel { background: var(--card); border: 1px solid var(--border-soft); border-radius: 12px; padding: 26px 28px; max-height: calc(100dvh - 100px); overflow-y: auto; }
  .panel-close { display: none; }
  .pp-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
  .pp-title { font-family: var(--display); font-size: 24px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; }
  .pp-sub { margin-top: 5px; font-family: var(--f-mono); font-size: 11.5px; color: rgba(255,255,255,0.44); display: flex; gap: 10px; flex-wrap: wrap; }
  .kind-chip { display: inline-block; font-size: 11.5px; font-weight: 600; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
  .status { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hushed); }
  .status.live::before { content: "●"; color: var(--up); margin-right: 5px; font-size: 9px; }
  .status.matured::before { content: "●"; color: rgba(255,255,255,0.44); margin-right: 5px; font-size: 9px; }
  .pp-bid { display: inline-flex; align-items: baseline; gap: 9px; margin-top: 13px; padding: 8px 14px; border-radius: 10px; background: rgba(85,192,138,0.12); border: 1px solid rgba(85,192,138,0.42); }
  .pp-bid .lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--up); }
  .pp-bid .val { font-family: var(--f-mono); font-size: 19px; font-weight: 600; color: var(--up); line-height: 1; }
  .pp-bid .u { font-size: 11px; color: rgba(85,192,138,0.72); }
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0 4px; }
  .tile { background: var(--tile); border-radius: 8px; padding: 12px 14px; }
  .tile .v { font-family: var(--f-mono); font-size: 16px; font-weight: 500; }
  .tile .k { margin-top: 4px; font-family: var(--f-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.44); }
  .sec { margin-top: 20px; }
  .sec .h { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--hushed); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .kv { display: flex; justify-content: space-between; gap: 18px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 13.5px; }
  .kv .k { color: var(--hushed); }
  .kv .v { text-align: right; }
  .kv .v.mono { font-family: var(--f-mono); font-size: 13px; }
  .asset-line { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; flex-wrap: wrap; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 13.5px; }
  .asset-line b { font-weight: 600; }
  .asset-line .fx-note { font-family: var(--f-mono); font-size: 12.5px; color: var(--hushed); }
  .placeholder { display: grid; place-items: center; min-height: 300px; color: var(--faint); font-size: 14px; }
  .disclaimer { margin-top: 20px; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.44); }

  @media (max-width: 900px) {
    .wrap { padding: 0 16px 32px; }
    .layout { grid-template-columns: 1fr; }
    .aside { position: static; max-height: none; }
    .list { max-height: 60dvh; }
    .panel-wrap { display: none; position: fixed; inset: 0; z-index: 40; background: var(--canvas); padding: 14px; overflow: auto; }
    .panel-wrap.open { display: block; }
    .panel { max-height: none; }
    .panel-close { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--card); border-radius: 6px; padding: 8px 14px; font-family: var(--f-body); font-size: 13.5px; cursor: pointer; }
  }
  @media (max-width: 860px) {
    .nav-in { height: auto; flex-wrap: wrap; padding: 12px 20px; row-gap: 10px; }
    .topnav { margin-left: 0; width: 100%; gap: 16px; font-size: 13.5px; }
  }
</style>

<script>
  const S = window.SITE;
  const D = window.PLACEMENTS_DATA;
  const TODAY = new Date().toISOString().slice(0, 10);
  const KINDS = {
    coupon:        { label: "Купонный", fg: "#EE7D1B", bg: "rgba(238,125,27,0.16)" },
    participation: { label: "Участие в росте", fg: "#4F86E6", bg: "rgba(79,134,230,0.16)" }
  };
  const fmtD = s => s ? s.split("-").reverse().join(".") : "—";
  const fmtN = v => v == null ? "—" : String(v).replace(".", ",").replace("-", "−");
  const fmtPerf = v => v == null ? null : (v > 0 ? "+" : "") + fmtN(v) + "%";
  const perfColor = v => v > 0 ? "#55C08A" : (v < 0 ? "#EE7D1B" : "rgba(242,243,247,0.64)");

  const issues = D.issues.map(i => ({ ...i, matured: i.maturity && i.maturity < TODAY }));
  let kind = "all", showMatured = false, q = "", selected = null;
  const openGroups = new Set();

  const assetOf = i => i.basket.map(b => b.n).join(", ");

  function keyParam(i) {
    const p = i.payoff;
    if (i.kind === "coupon") return p.couponPa != null ? "купон " + fmtN(p.couponPa) + "%" : "купонный";
    return p.participationPct != null ? "участие " + fmtN(p.participationPct) + "%" : "участие";
  }

  function passportHTML(i) {
    const p = i.payoff, k = KINDS[i.kind] || KINDS.coupon;
    const kv = rows => rows.map(r =>
      '<div class="kv"><span class="k">' + r[0] + '</span><span class="v' + (r[2] ? " mono" : "") + '">' + r[1] + '</span></div>').join("");
    const assets = i.basket.map(b => {
      let mid = "";
      if (b.f0 != null) mid = "фиксинг " + fmtN(b.f0) + (b.px != null ? " → " + fmtN(b.px) + (b.pxTime ? " (" + fmtD(b.pxTime) + ")" : "") : "");
      const perf = b.perfPct != null ? '<span style="color:' + perfColor(b.perfPct) + ';font-weight:600;font-family:var(--f-mono);font-size:12.5px">' + fmtPerf(b.perfPct) + '</span>' : "";
      return '<div class="asset-line"><b>' + b.n + '</b><span class="fx-note">' + mid + '</span>' + perf + '</div>';
    }).join("");
    const pay = [];
    if (i.kind === "coupon") {
      if (p.couponPa != null) pay.push(["Купон", fmtN(p.couponPa) + "% годовых" + (p.couponPeriodPct != null ? " (" + fmtN(p.couponPeriodPct) + "% за период)" : "")]);
      if (p.couponBarrierPct != null) pay.push(["Барьер купона", fmtN(p.couponBarrierPct) + "% нач. уровня"]);
      pay.push(["Эффект памяти", p.memory ? "да" : "нет"]);
      pay.push(["Автоотзыв", p.acBarrierPct != null ? "барьер " + fmtN(p.acBarrierPct) + "%" : "не предусмотрен"]);
      if (p.protection) pay.push(["Защита на погашение", (p.protection.type === "EKI" ? "барьерная (EKI)" : p.protection.type) + (p.protection.barrierPct != null ? " · барьер " + fmtN(p.protection.barrierPct) + "%" : "")]);
      if (p.obsCount) pay.push(["Наблюдений до погашения", String(p.obsCount), true]);
    } else {
      pay.push(["Участие в росте", p.participationPct != null ? fmtN(p.participationPct) + "%" : "—", true]);
      pay.push(["Защита номинала", p.protectionPct ? fmtN(p.protectionPct) + "%" : "не предусмотрена"]);
      if (p.strikePct != null) pay.push(["Страйк", fmtN(p.strikePct) + "% нач. уровня" + (p.strike2Pct ? " · потолок " + fmtN(p.strike2Pct) + "%" : "")]);
      pay.push(["Опцион", (p.optType || "") + (p.style === "EUROPEAN" ? " · европейский" : "")]);
    }
    if (i.fx) pay.push(["Валютная составляющая", "с валютной переоценкой (FX)"]);

    const docs = (window.PLACEMENT_DOCS || {})[i.isin] || [];
    const docsHTML = docs.length
      ? '<div class="sec"><div class="h">Документы</div>' + docs.map(d =>
          '<a class="doc-link" href="' + d.file + '" target="_blank" rel="noopener">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#EE7D1B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>' +
          '<span>' + d.name + '</span></a>').join("") + '</div>'
      : '';

    return '<div class="pp-top"><div>' +
        '<div class="pp-title">' + i.serial + '</div>' +
        '<div class="pp-sub"><span>' + i.isin + '</span><span class="status ' + (i.matured ? "matured" : "live") + '">' + (i.matured ? "погашен" : "в обращении") + '</span></div>' +
        (!i.matured && i.bid != null ? '<div class="pp-bid"><span class="lbl">Bid</span><span class="val">' + fmtN(i.bid) + '%</span><span class="u">от номинала</span></div>' : '') +
      '</div>' +
      '<span class="kind-chip" style="color:' + k.fg + ';background:' + k.bg + '">' + k.label + '</span></div>' +
      '<div class="tiles">' +
        '<div class="tile"><div class="v">' + keyParam(i).replace(/^(купон|участие) /, "") + '</div><div class="k">' + (i.kind === "coupon" ? "купон годовых" : "участие в росте") + '</div></div>' +
        '<div class="tile"><div class="v" style="color:' + (i.perfPct != null ? perfColor(i.perfPct) : "rgba(255,255,255,0.44)") + '">' + (fmtPerf(i.perfPct) || "—") + '</div><div class="k">динамика БА</div></div>' +
        '<div class="tile"><div class="v">' + fmtD(i.maturity) + '</div><div class="k">погашение</div></div>' +
      '</div>' +
      '<div class="sec"><div class="h">Базовый актив</div>' + assets + '</div>' +
      '<div class="sec"><div class="h">Параметры выплаты</div>' + kv(pay) +
        (i.fx ? '<div style="margin-top:12px;padding:9px 13px;border-left:3px solid #EE7D1B;background:rgba(238,125,27,0.12);border-radius:0 7px 7px 0;font-size:12.5px;line-height:1.5;color:#E7B98D">' + S.LEGAL.fx + '</div>' : '') + '</div>' +
      '<div class="sec"><div class="h">Даты</div>' + kv([
        ["Размещение", fmtD(i.issueStart), true],
        ["Начальная фиксация", fmtD(i.dates.initialFixing), true],
        ["Финальная фиксация", fmtD(i.dates.expiry), true],
        ["Расчёт", fmtD(i.dates.settlement), true],
        ["Погашение", fmtD(i.maturity), true]
      ]) + '</div>' +
      '<div class="sec"><div class="h">Реквизиты</div>' + kv([
        ["Номинал", i.notional ? Math.round(i.notional) + " " + (i.currency || "") : "—", true],
        ["Рег. номер", i.regNumber || "—", true],
        ["ISIN", i.isin, true]
      ]) + '</div>' + docsHTML;
  }

  function filtered() {
    const needle = q.trim().toLowerCase();
    return issues.filter(i =>
      (kind === "all" || i.kind === kind) &&
      (showMatured || !i.matured) &&
      (!needle || (i.serial + " " + i.isin + " " + assetOf(i)).toLowerCase().includes(needle)));
  }

  function select(isin, fromUser) {
    selected = isin;
    const i = issues.find(x => x.isin === isin);
    if (!i) return;
    document.getElementById("panel").innerHTML = passportHTML(i);
    document.querySelectorAll(".item").forEach(el =>
      el.classList.toggle("active", el.getAttribute("data-isin") === isin));
    history.replaceState(null, "", "#" + isin);
    // Мобильный оверлей — только по явному действию пользователя
    if (fromUser && window.matchMedia("(max-width: 900px)").matches) {
      document.getElementById("panel-wrap").classList.add("open");
    }
  }

  function itemHTML(i) {
    return '<button class="item' + (i.matured ? " matured" : "") + (i.isin === selected ? " active" : "") + '" data-isin="' + i.isin + '">' +
      '<div class="r1"><span class="serial">' + i.serial + '</span><span class="param">' + keyParam(i) + '</span></div>' +
      '<div class="r2"><span class="isin">' + i.isin + '</span>' +
      '<span class="perf" style="color:' + (i.perfPct != null ? perfColor(i.perfPct) : "rgba(255,255,255,0.44)") + '">' + (fmtPerf(i.perfPct) || "—") + '</span></div>' +
    '</button>';
  }

  function render() {
    const list = filtered();
    document.getElementById("count").textContent = "выпусков: " + list.length;

    // Группы по базовому активу, крупные сверху
    const groups = new Map();
    list.forEach(i => {
      const key = assetOf(i);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(i);
    });
    const sorted = [...groups.entries()].sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0], "ru"));
    const searching = q.trim().length > 0;

    document.getElementById("list").innerHTML = sorted.length ? sorted.map(([name, items], gi) => {
      const open = searching || openGroups.has(name) || (openGroups.size === 0 && gi === 0);
      return '<button class="group-h' + (open ? " open" : "") + '" data-g="' + name.replace(/"/g, "&quot;") + '" aria-expanded="' + open + '">' +
          '<span class="chev">▶</span><span class="name">' + name + '</span><span class="gc">' + items.length + '</span></button>' +
        '<div class="group-items' + (open ? " open" : "") + '">' + items.map(itemHTML).join("") + '</div>';
    }).join("") : '<div class="empty-list">Ничего не найдено — измените фильтры или запрос.</div>';

    document.querySelectorAll(".group-h").forEach(el => el.addEventListener("click", () => {
      const g = el.getAttribute("data-g");
      // Материализуем неявно открытую первую группу, чтобы клики не схлопывали её
      if (openGroups.size === 0 && sorted.length) openGroups.add(sorted[0][0]);
      if (openGroups.has(g)) openGroups.delete(g); else openGroups.add(g);
      render();
    }));
    document.querySelectorAll(".item").forEach(el =>
      el.addEventListener("click", () => select(el.getAttribute("data-isin"), true)));

    // Авто-выбор первого видимого выпуска (без открытия мобильного оверлея)
    if (list.length && (!selected || !list.some(i => i.isin === selected))) {
      const first = sorted[0] && sorted[0][1][0];
      if (first) select(first.isin, false);
    }
  }

  const counts = { all: issues.length };
  issues.forEach(i => counts[i.kind] = (counts[i.kind] || 0) + 1);
  document.getElementById("kinds").innerHTML = ["all", "coupon", "participation"].map(kk =>
    '<button class="kf' + (kk === "all" ? " active" : "") + '" data-k="' + kk + '">' +
    (kk === "all" ? "Все" : KINDS[kk].label) + '<span class="n">' + (counts[kk] || 0) + '</span></button>').join("");
  document.querySelectorAll(".kf").forEach(b => b.addEventListener("click", () => {
    kind = b.getAttribute("data-k");
    document.querySelectorAll(".kf").forEach(x => x.classList.toggle("active", x === b));
    render();
  }));
  document.getElementById("show-matured").addEventListener("change", e => { showMatured = e.target.checked; render(); });
  document.getElementById("search").addEventListener("input", e => { q = e.target.value; render(); });
  document.getElementById("panel-close").addEventListener("click", () =>
    document.getElementById("panel-wrap").classList.remove("open"));

  // Deep-link: открыть группу выбранного выпуска
  const hash = location.hash.slice(1);
  if (hash) {
    const i = issues.find(x => x.isin === hash);
    if (i) {
      selected = hash;
      openGroups.add(assetOf(i));
      // Погашенные скрыты по умолчанию — если ссылка ведёт на такой, показываем их,
      // иначе выбор молча слетает на первый видимый выпуск.
      if (i.matured) {
        showMatured = true;
        const cb = document.getElementById("show-matured");
        if (cb) cb.checked = true;
      }
    }
  }
  render();
  if (selected) select(selected);
</script>
<script src="chat.js?v=2"></script>
</body>
</html>
