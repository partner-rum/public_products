<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One-pager</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F4F2F0; --card: #FFFFFF; --ink: #0C0A08; --black: #1A1919;
    --hushed: #57534E; --faint: #8A847D;
    --border: #E0DCD6; --line: #EDE9E3;
    --solar: #E4F222; --solar-l: #F5FF78;
    --up: #1F7A53; --down: #E96516; --amber: #B3801F;
    --f: 'Onest', system-ui, sans-serif;
    --m: 'JetBrains Mono', Consolas, monospace;
  }
  /* Принудительная печать фонов и цветов — иначе PDF без заливок */
  * { box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  body { margin: 0; background: #57534E; font-family: var(--f); -webkit-font-smoothing: antialiased; }

  /* Экранная панель (в печать не идёт) */
  .toolbar { position: sticky; top: 0; z-index: 10; background: var(--black); color: #F2EFE9; display: flex; align-items: center; gap: 16px; padding: 12px 22px; }
  .toolbar a { color: #C9C3BB; text-decoration: none; font-size: 14px; }
  .toolbar a:hover { color: #fff; }
  .toolbar .hint { font-size: 12px; color: #8A847D; margin-left: auto; }
  .btn-print { background: var(--solar); border: none; color: var(--ink); font-family: var(--f); font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 7px; cursor: pointer; }
  .btn-print:hover { background: var(--solar-l); }

  .slide { position: relative; width: 960px; height: 540px; margin: 18px auto; background: var(--canvas); overflow: hidden; box-shadow: 0 10px 34px rgba(0,0,0,0.45); }

  /* Общие */
  .brand { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; }
  .qual { font-family: var(--m); font-size: 9px; line-height: 1.55; letter-spacing: 0.02em; text-align: right; }
  .foot { position: absolute; left: 52px; right: 52px; bottom: 20px; font-size: 8.6px; line-height: 1.5; color: var(--faint); }
  .tag { font-family: var(--m); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── Слайд 1 — титул ── */
  .t-slide { background: var(--black); color: #F5F2EC; }
  .t-top { position: absolute; top: 34px; left: 52px; right: 52px; display: flex; justify-content: space-between; align-items: flex-start; }
  .t-top .brand { color: #F5F2EC; }
  .t-top .qual { color: #8F8981; }
  .t-badge { position: absolute; left: 52px; top: 210px; font-family: var(--m); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--solar); }
  .t-title { position: absolute; left: 52px; top: 236px; right: 90px; font-size: 48px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.08; color: #FFFFFF; }
  .t-sub { position: absolute; left: 52px; top: 232px; right: 90px; }
  .t-underline { position: absolute; left: 52px; bottom: 118px; width: 64px; height: 5px; background: var(--solar); }
  .t-meta { position: absolute; left: 52px; bottom: 30px; font-family: var(--m); font-size: 11px; color: #8F8981; letter-spacing: 0.04em; }
  .t-star { position: absolute; right: 52px; bottom: 30px; }

  /* ── Слайд 2 — описание инструмента ── */
  .c-head { padding: 36px 52px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
  .c-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; color: var(--ink); }
  .c-badge { display: inline-block; margin-top: 7px; font-family: var(--m); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); background: #E7E3DC; border-radius: 5px; padding: 3px 8px; }
  .c-sub { margin-top: 8px; font-size: 11.5px; line-height: 1.45; color: var(--hushed); max-width: 430px; }
  .c-quote { text-align: right; flex: none; }
  .c-quote .v { font-family: var(--m); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); }
  .c-quote .k { font-size: 9.5px; color: var(--faint); margin-top: 2px; }
  .c-quote .chg { font-family: var(--m); font-size: 11.5px; font-weight: 600; margin-top: 3px; }

  .c-grid { display: grid; grid-template-columns: 1fr 1.06fr; gap: 26px; padding: 16px 52px 0; }
  .lbl { font-family: var(--m); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
  .expl { font-size: 11px; line-height: 1.5; color: var(--hushed); }
  .formula { margin-top: 10px; }
  .formula code { display: inline-block; font-family: var(--m); font-size: 11px; color: var(--ink); background: #FFFFFF; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
  .params { margin-top: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .param { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; }
  .param .v { font-family: var(--m); font-size: 13px; font-weight: 500; color: var(--ink); }
  .param .k { font-size: 9px; color: var(--faint); margin-top: 1px; }

  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px 8px; }
  .chart-box .ct { font-size: 11px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .chart-cap { margin-top: 5px; font-size: 9px; line-height: 1.4; color: var(--faint); }
  .example { margin-top: 11px; }
  .ex-intro { font-size: 10px; color: var(--hushed); margin-bottom: 6px; }
  .scen { display: flex; flex-direction: column; gap: 5px; }
  .scard { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; }
  .scard .st { font-size: 10.5px; font-weight: 600; color: var(--ink); }
  .scard .sd { font-size: 9px; color: var(--faint); margin-top: 1px; }
  .scard .sr { font-family: var(--m); font-size: 11.5px; font-weight: 600; white-space: nowrap; }

  /* ── Слайд 3 — дисклеймер ── */
  .d-head { padding: 40px 52px 0; }
  .d-title { font-size: 25px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); }
  .d-body { padding: 20px 52px 0; column-count: 2; column-gap: 34px; }
  .d-body p { margin: 0 0 11px; font-size: 10.2px; line-height: 1.62; color: var(--hushed); break-inside: avoid; }

  @media print {
    @page { size: 10in 5.625in; margin: 0; }
    body { background: #fff; }
    .toolbar { display: none !important; }
    .slide { margin: 0; box-shadow: none; page-break-after: always; }
    .slide:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a id="back-link" href="index.html">← К инструменту</a>
  <span class="hint">Если PDF без цвета — включите «Фоновая графика» в диалоге печати</span>
  <button class="btn-print" onclick="window.print()">Сохранить как PDF</button>
</div>

<div id="deck"></div>

<script src="data/instruments.js"></script>
<script src="data/lib.js"></script>
<script>
  const S = window.SITE;
  const qs = new URLSearchParams(location.search);
  const inst = S.findInstrument(qs.get("id"));
  const nom = inst.minNom;
  const q = inst.quote;

  document.title = "One-pager — " + S.displayName(inst);
  document.getElementById("back-link").href = "instrument.html?id=" + encodeURIComponent(inst.id);

  const today = new Date();
  const dateS = ("0" + today.getDate()).slice(-2) + "." + ("0" + (today.getMonth() + 1)).slice(-2) + "." + today.getFullYear();

  const starSvg = (s, fill) => '<svg width="' + s + '" height="' + s + '" viewBox="0 0 26 26" fill="none"><path d="M13 1 L15.6 10.4 L25 13 L15.6 15.6 L13 25 L10.4 15.6 L1 13 L10.4 10.4 Z" fill="' + fill + '"/></svg>';
  const QUAL = "Только для квалифицированных инвесторов<br>Не является инвестиционной рекомендацией";

  // ── Диаграммы выплат (Ramp-палитра) ──
  const CW = 420, CH = 190, PAD = 22;
  const MONO = 'font-family="JetBrains Mono, monospace"';
  const C = { line: "#1A1919", gold: "#B3801F", grid: "#E7E3DC", axis: "#D3CEC7", lab: "#8A847D", lab2: "#57534E" };

  function chWarrant() {
    const K = inst.strike, K2 = inst.strike2;
    const cap = K2 ? (K2 - K) / K * 100 : 0;
    const sBe = K * (1 + q / 100), s0 = K * 0.8;
    const s1 = K2 ? K2 * 1.18 : Math.max(K * 1.32, sBe * 1.15);
    const yMax = K2 ? cap + 10 : Math.max(34, S.PAYOFF.pct(s1, K) + 6);
    const x = s => PAD + ((s - s0) / (s1 - s0)) * (CW - PAD * 2);
    const y = v => CH - PAD - (v / yMax) * (CH - PAD * 2);
    let line = "M" + x(s0).toFixed(1) + " " + y(0).toFixed(1) + " L" + x(K).toFixed(1) + " " + y(0).toFixed(1);
    if (K2) line += " L" + x(K2).toFixed(1) + " " + y(cap).toFixed(1) + " L" + x(s1).toFixed(1) + " " + y(cap).toFixed(1);
    else line += " L" + x(s1).toFixed(1) + " " + y(S.PAYOFF.pct(s1, K)).toFixed(1);
    let capMark = "";
    if (K2) capMark = '<line x1="' + PAD + '" y1="' + y(cap) + '" x2="' + (CW - PAD) + '" y2="' + y(cap) + '" stroke="' + C.grid + '" stroke-width="1" stroke-dasharray="2 4"/>' +
      '<rect x="' + (x(K2) - 4) + '" y="' + (y(cap) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K2) + ' ' + y(cap) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(K2) + '" y="' + (y(cap) - 9) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K₂ ' + S.fmtSmart(K2) + ' · макс. ' + S.fmtSmart(cap) + '%</text>';
    const beEnd = x(sBe) > CW * 0.72;
    return '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + y(0) + '" x2="' + (CW - PAD) + '" y2="' + y(0) + '" stroke="' + C.grid + '" stroke-width="1"/>' +
      '<line x1="' + PAD + '" y1="' + y(q) + '" x2="' + (CW - PAD) + '" y2="' + y(q) + '" stroke="' + C.gold + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(q) - 6) + '" fill="' + C.gold + '" font-size="10" ' + MONO + '>премия ' + S.fmt1(q) + '%</text>' + capMark +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<rect x="' + (x(K) - 4) + '" y="' + (y(0) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K) + ' ' + y(0) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(K) + '" y="' + (y(0) + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K ' + S.fmtSmart(K) + '</text>' +
      '<circle cx="' + x(sBe) + '" cy="' + y(q) + '" r="4" fill="' + C.gold + '"/>' +
      '<text x="' + (x(sBe) + (beEnd ? -7 : 7)) + '" y="' + (y(q) + 15) + '"' + (beEnd ? ' text-anchor="end"' : '') + ' fill="' + C.gold + '" font-size="10" ' + MONO + '>б/у ' + S.fmtSmart(sBe) + '</text>' +
      '</svg>';
  }
  function chDiscount() {
    const base = CH - 40, pxPer = (CH - 84) / 110, barW = 84;
    const x1 = CW * 0.31 - barW / 2, x2 = CW * 0.69 - barW / 2;
    const h1 = q * pxPer, h2 = 100 * pxPer;
    return '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + base + '" x2="' + (CW - PAD) + '" y2="' + base + '" stroke="' + C.axis + '" stroke-width="1"/>' +
      '<line x1="' + (x1 + barW / 2) + '" y1="' + (base - h1) + '" x2="' + (x2 + barW) + '" y2="' + (base - h1) + '" stroke="' + C.gold + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<rect x="' + x1 + '" y="' + (base - h1) + '" width="' + barW + '" height="' + h1 + '" rx="6" fill="#DAD5CE"/>' +
      '<rect x="' + x2 + '" y="' + (base - h2) + '" width="' + barW + '" height="' + h2 + '" rx="6" fill="' + C.line + '"/>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base - h1 - 8) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="12" ' + MONO + '>' + S.fmt2(q) + '%</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base - h2 - 8) + '" text-anchor="middle" fill="' + C.line + '" font-size="12" ' + MONO + '>100%</text>' +
      '<text x="' + ((x1 + barW + x2) / 2) + '" y="' + (base - h1 - 7) + '" text-anchor="middle" fill="' + C.gold + '" font-size="10" ' + MONO + '>+' + S.fmt2(100 - q) + ' п.п.</text>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10">Покупка</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10">Погашение</text>' +
      '</svg>';
  }
  function chProtection() {
    const part = inst.participation, yMin = 88, yMax = 130;
    const x = rel => PAD + ((rel - 0.7) / (1.4 - 0.7)) * (CW - PAD * 2);
    const y = v => CH - PAD - ((v - yMin) / (yMax - yMin)) * (CH - PAD * 2);
    const endVal = 100 + part * 40;
    const line = "M" + x(0.7).toFixed(1) + " " + y(100).toFixed(1) + " L" + x(1.0).toFixed(1) + " " + y(100).toFixed(1) + " L" + x(1.4).toFixed(1) + " " + y(endVal).toFixed(1);
    return '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + y(100) + '" x2="' + (CW - PAD) + '" y2="' + y(100) + '" stroke="' + C.axis + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(100) + 15) + '" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>защита 100%</text>' +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<rect x="' + (x(1.0) - 4) + '" y="' + (y(100) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(1.0) + ' ' + y(100) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(1.0) + '" y="' + (y(100) + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>S₀</text>' +
      '<text x="' + x(1.24) + '" y="' + (y(100 + part * 24) - 11) + '" fill="' + C.line + '" font-size="10" ' + MONO + '>участие ' + Math.round(part * 100) + '%</text>' +
      '</svg>';
  }

  // ── Контент по типу ──
  let c = {};
  if (inst.type === "warrant") {
    const isCS = inst.structure === "cs";
    const K = inst.strike, K2 = inst.strike2;
    const capPct = isCS ? (K2 - K) / K * 100 : 0;
    const premiumRub = nom * q / 100;
    const upPct = Math.max(16, Math.ceil((q + 6) / 5) * 5);
    const payout1 = nom * S.PAYOFF.pct(K * (1 + upPct / 100), K, K2) / 100;
    const net1 = payout1 - premiumRub;
    const params = [["Страйк (K)", S.fmtSmart(K) + "% нач. уровня"]];
    if (isCS) params.push(["Потолок (K₂)", S.fmtSmart(K2) + "% · до " + S.fmtSmart(capPct) + "%"]);
    params.push(["Срок", inst.tenor], ["Экспирация", inst.expiry], ["Мин. номинал", S.fmtInt(nom) + " ₽"]);
    const scen = [
      [inst.underlying + " вырос на " + upPct + "%", "выплата " + S.fmtInt(payout1) + " ₽", (net1 >= 0 ? "+" : "−") + S.fmtInt(Math.abs(net1)) + " ₽", net1 >= 0 ? "var(--up)" : "var(--down)"],
      [inst.underlying + " не вырос", "выплаты нет — максимум убытка", "−" + S.fmtInt(premiumRub) + " ₽", "var(--down)"]
    ];
    c = {
      badge: isCS ? "Колл-спред · структурная облигация" : "CALL · структурная облигация",
      subtitle: "Заработать на росте " + inst.underlying + " с полной экспозицией на номинал и риском, ограниченным премией.",
      chart: chWarrant, params, scen,
      chartCap: isCS
        ? "Выплата в % от номинала; уровень БА — в % от начального. Выше K₂ не растёт (макс. " + S.fmtSmart(capPct) + "%). Пунктир — премия; б/у — безубыток."
        : "Выплата в % от номинала; уровень БА — в % от начального. Пунктир — премия; б/у — точка безубытка.",
      formula: S.PAYOFF.formula(inst),
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · премия " + S.fmt2(q) + "% = " + S.fmtInt(premiumRub) + " ₽",
      explainer: isCS
        ? "Колл-спред — CALL с потолком выплаты. Страйк фиксируется по уровню актива в день покупки; рост засчитывается до K₂. Инвестор платит только премию (" + S.fmt2(q) + "% номинала) и получает экспозицию на весь номинал. Если актив не вырос — теряется только премия."
        : "CALL-варрант — право на выплату, равную росту базового актива сверх страйка. Инвестор платит только премию (" + S.fmt2(q) + "% номинала) и получает экспозицию на весь номинал без маржин-коллов. Если актив не вырос — теряется только премия."
    };
  } else if (inst.type === "discount") {
    const buyRub = nom * q / 100;
    c = {
      badge: "Дисконтная облигация",
      subtitle: "Покупка дешевле номинала, погашение по 100% — доход зафиксирован в день сделки.",
      chart: chDiscount,
      chartCap: "Покупка дешевле номинала, погашение по 100%. Доход — разница, зафиксированная в момент покупки.",
      formula: "100% номинала на погашение",
      params: [["Цена покупки", S.fmt2(q) + "% номинала"], ["Доходность", S.fmt1(S.yieldAnnual(inst)) + "% год."], ["Погашение", inst.expiry], ["Осталось", S.daysTo(inst.expiry) + " дн."]],
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · покупка по " + S.fmt2(q) + "% = " + S.fmtInt(buyRub) + " ₽",
      scen: [
        ["Дождались погашения", "выплата 100% номинала", "+" + S.fmtInt(nom - buyRub) + " ₽", "var(--up)"],
        ["Продали раньше срока", "по текущей рыночной цене", "по рынку", "var(--lab2, #57534E)"]
      ],
      explainer: "Облигация покупается дешевле номинала — по " + S.fmt2(q) + "% от него. На дату погашения выплачивается полный номинал, 100%. Весь доход — дисконт: разница между ценой покупки и номиналом, известная в день сделки. Купонов нет; основной риск — кредитное качество эмитента."
    };
  } else {
    const entryRub = nom * q / 100;
    const part = Math.round(inst.participation * 100);
    const upPct = 20;
    const payoutUp = nom * (1 + inst.participation * upPct / 100);
    c = {
      badge: "Нота · защита капитала",
      subtitle: "Участие в росте " + inst.underlying + " с возвратом 100% номинала при любом сценарии.",
      chart: chProtection,
      chartCap: "Выплата в % от номинала: не ниже 100% при любом сценарии, выше S₀ — участие в росте.",
      formula: "100% + " + part + "% × max(S/S₀ − 1; 0)",
      params: [["Защита капитала", "100%"], ["Участие в росте", part + "%"], ["Нач. уровень S₀", S.fmtSmart(inst.strike)], ["Экспирация", inst.expiry]],
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · вход по " + S.fmt2(q) + "% = " + S.fmtInt(entryRub) + " ₽",
      scen: [
        [inst.underlying + " вырос на " + upPct + "%", "выплата 100% + участие", "+" + S.fmtInt(payoutUp - entryRub) + " ₽", "var(--up)"],
        [inst.underlying + " упал", "сработала защита — 100% номинала", S.fmtInt(nom) + " ₽", "var(--lab2, #57534E)"]
      ],
      explainer: "Нота возвращает 100% номинала при любом сценарии. Если базовый актив на дату экспирации выше начального уровня S₀, дополнительно выплачивается " + part + "% его роста. Если актив упал — вы получаете номинал целиком. Основной риск — кредитный риск эмитента ноты."
    };
  }

  const name = S.displayName(inst);
  const chgUp = inst.chg > 0;
  let html = "";

  // ── Слайд 1 — титул ──
  html += '<section class="slide t-slide">' +
    '<div class="t-top"><div class="brand">' + starSvg(20, "#E4F222") + ' Структурные продукты</div>' +
      '<div class="qual">' + QUAL + '</div></div>' +
    '<div class="t-badge">' + c.badge + '</div>' +
    '<div class="t-title">' + name + '</div>' +
    '<div class="t-underline"></div>' +
    '<div class="t-meta">' + dateS + ' · ' + inst.id + '</div>' +
    '<div class="t-star">' + starSvg(26, "#3A3632") + '</div>' +
    '</section>';

  // ── Слайд 2 — описание инструмента ──
  html += '<section class="slide">' +
    '<div class="c-head"><div>' +
        '<div class="c-title">' + name + '</div>' +
        '<span class="c-badge">' + c.badge + '</span>' +
        '<div class="c-sub">' + c.subtitle + '</div>' +
      '</div>' +
      '<div class="c-quote"><div class="v">' + S.fmt2(q) + '%</div><div class="k">котировка · % от номинала</div>' +
        '<div class="chg" style="color:' + (chgUp ? "var(--up)" : "var(--down)") + '">' + (chgUp ? "+" : "−") + S.fmt1(Math.abs(inst.chg)) + ' п.п. сегодня</div></div>' +
    '</div>' +
    '<div class="c-grid">' +
      '<div>' +
        '<div class="lbl">Как устроен продукт</div>' +
        '<div class="expl">' + c.explainer + '</div>' +
        '<div class="formula"><code>' + c.formula + '</code></div>' +
        '<div class="params">' + c.params.map(p => '<div class="param"><div class="v">' + p[1] + '</div><div class="k">' + p[0] + '</div></div>').join("") + '</div>' +
      '</div>' +
      '<div>' +
        '<div class="chart-box"><div class="ct">Диаграмма выплат</div>' + c.chart() + '<div class="chart-cap">' + c.chartCap + '</div></div>' +
        '<div class="example"><div class="lbl">Пример расчёта</div><div class="ex-intro">' + c.exIntro + '</div>' +
          '<div class="scen">' + c.scen.map(s => '<div class="scard"><div><div class="st">' + s[0] + '</div><div class="sd">' + s[1] + '</div></div><div class="sr" style="color:' + s[3] + '">' + s[2] + '</div></div>').join("") + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="foot">Продукт: структурная облигация на базовый актив ' + inst.underlying + '. Пример иллюстративный, без учёта комиссий и налогов. ' + S.LEGAL.qual + '</div>' +
    '</section>';

  // ── Слайд 3 — дисклеймер ──
  html += '<section class="slide">' +
    '<div class="d-head"><div class="brand" style="font-size:11.5px;color:var(--faint);margin-bottom:20px">' + starSvg(15, "#1A1919") + ' Структурные продукты</div>' +
      '<div class="d-title">Ограничение ответственности</div></div>' +
    '<div class="d-body">' + S.LEGAL.onepager.map(p => "<p>" + p + "</p>").join("") + '</div>' +
    '<div class="foot">' + dateS + ' · ' + inst.id + '</div>' +
    '</section>';

  document.getElementById("deck").innerHTML = html;

  if (qs.get("print") === "1") {
    (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve())
      .then(() => setTimeout(() => window.print(), 400));
  }
</script>
</body>
</html>
