<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One-pager</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F4F2F0; --card: #FFFFFF;
    --nav: #1B2153; --nav2: #283067; --nav-deep: #0D1026;
    --or: #EE7D1B; --or-soft: #FBEAD6;
    --ink: #20233F; --hushed: #5A6180; --faint: #8B90A8;
    --border: #DCDEEC; --line: #EAEBF4;
    --up: #1E7C4F; --down: #C0561A;
    --f: 'Onest', system-ui, sans-serif;
    --m: 'JetBrains Mono', Consolas, monospace;
    --display: 'Rubik', 'Onest', system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  body { margin: 0; background: #4A4E63; font-family: var(--f); -webkit-font-smoothing: antialiased; }

  .toolbar { position: sticky; top: 0; z-index: 10; background: var(--nav-deep); color: #E7E9F4; display: flex; align-items: center; gap: 14px; padding: 11px 22px; }
  .toolbar a { color: #AEB3D0; text-decoration: none; font-size: 14px; }
  .toolbar a:hover { color: #fff; }
  .themes { display: flex; gap: 6px; }
  .themes a { border: 1px solid #3A4068; border-radius: 6px; padding: 5px 12px; font-size: 12.5px; }
  .themes a.on { background: var(--or); border-color: var(--or); color: #1A1206; font-weight: 600; }
  .toolbar .sp { margin-left: auto; }
  .btn-print { background: var(--or); border: none; color: #1A1206; font-family: var(--f); font-size: 14px; font-weight: 600; padding: 9px 18px; border-radius: 7px; cursor: pointer; }
  .btn-print:hover { background: #F58E33; }

  .slide { position: relative; width: 960px; height: 540px; margin: 18px auto; background: var(--ivory); overflow: hidden; box-shadow: 0 12px 36px rgba(13,16,38,0.5); display: flex; flex-direction: column; }

  .brand { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; }
  .qual { font-family: var(--m); font-size: 9px; line-height: 1.55; letter-spacing: 0.02em; text-align: right; }
  .lbl { font-family: var(--m); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--or); margin-bottom: 6px; }

  /* ── Слайд 1 — титул (C: navy + оранжевые блоки) ── */
  .t-slide { padding: 34px 52px; justify-content: space-between; background: var(--nav); color: #F3F4FB; }
  .t-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .t-top .brand { color: #F3F4FB; }
  .t-top .qual { color: #9CA1C4; }
  .t-badge { font-family: var(--m); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--or); margin-bottom: 12px; }
  .t-title { font-family: var(--display); font-size: 46px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.08; max-width: 780px; color: #FFFFFF; }
  .t-bar { margin-top: 20px; width: 68px; height: 5px; background: var(--or); }
  .t-meta { font-family: var(--m); font-size: 11px; letter-spacing: 0.04em; color: #9CA1C4; }
  .t-blocks { position: absolute; inset: 0; pointer-events: none; }
  .t-blocks i { position: absolute; background: var(--or); display: block; }

  /* ── Слайд 2 — описание ── */
  .c-head { padding: 20px 52px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
  .c-title { font-family: var(--display); font-size: 23px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.12; color: var(--ink); }
  .c-badge { display: inline-block; margin-top: 8px; font-family: var(--m); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--nav); background: #E4E6F2; border-radius: 5px; padding: 3px 9px; }
  .c-sub { margin-top: 9px; font-size: 11.5px; line-height: 1.45; color: var(--hushed); max-width: 440px; }
  .c-quote { text-align: right; flex: none; }
  .c-quote .v { font-family: var(--m); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; color: var(--nav); }
  .c-quote .k { font-size: 9.5px; color: var(--faint); margin-top: 2px; }

  .c-body { flex: 1; min-height: 0; padding: 14px 52px 0; display: flex; }
  .c-row { flex: 1; display: grid; grid-template-columns: 1fr 1.02fr; gap: 22px; }
  .col { display: flex; flex-direction: column; min-height: 0; }
  .col.between { justify-content: space-between; gap: 14px; }

  .expl { font-size: 10.5px; line-height: 1.55; color: var(--hushed); }
  .callout { background: var(--nav); border-radius: 10px; padding: 14px 16px; }
  .callout .lbl { color: #E7A867; }
  .callout .expl { color: #D2D6EC; }
  .callout .expl b { color: #fff; font-weight: 600; }
  .under { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.16); }
  .under .expl { color: #E4E7F4; }

  .params { display: grid; gap: 8px; }
  .params.c2 { grid-template-columns: 1fr 1fr; }
  .params.c4 { grid-template-columns: repeat(4, 1fr); }
  .param { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; }
  .param .v { font-family: var(--m); font-size: 14px; font-weight: 500; color: var(--ink); }
  .param .v.or { color: var(--or); }
  .param .k { font-size: 9px; color: var(--faint); margin-top: 2px; }

  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px 7px; }
  .chart-box .ct { font-size: 11px; font-weight: 600; color: var(--nav); margin-bottom: 3px; }
  .chart-cap { margin-top: 5px; font-size: 9px; line-height: 1.4; color: var(--faint); }

  .example .lbl { margin-bottom: 6px; }
  .ex-intro { font-size: 10px; color: var(--hushed); margin-bottom: 6px; }
  .scen { display: grid; gap: 6px; }
  .scen.c1 { grid-template-columns: 1fr; }
  .scen.c2 { grid-template-columns: 1fr 1fr; }
  .scard { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; }
  .scard .st { font-size: 10.5px; font-weight: 600; color: var(--ink); }
  .scard .sd { font-size: 9px; color: var(--faint); margin-top: 1px; }
  .scard .sr { font-family: var(--m); font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .fx-inline { margin-top: 8px; padding: 7px 11px; border-left: 3px solid var(--or); background: var(--or-soft); border-radius: 0 6px 6px 0; font-size: 9.5px; line-height: 1.4; font-weight: 500; color: #7A4A12; }

  .c-foot { padding: 12px 52px 16px; font-size: 8.6px; line-height: 1.5; color: var(--faint); }

  /* ── Слайд 3 — дисклеймер (navy) ── */
  .d-slide { padding: 34px 52px; background: var(--nav); color: #E7E9F4; }
  .d-title { font-family: var(--display); font-size: 25px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .d-bar { width: 56px; height: 4px; background: var(--or); margin-bottom: 18px; }
  .d-body { flex: 1; column-count: 2; column-gap: 34px; }
  .d-body p { margin: 0 0 11px; font-size: 10.2px; line-height: 1.6; break-inside: avoid; color: rgba(231,233,244,0.86); }
  .d-meta { font-family: var(--m); font-size: 9px; color: #9CA1C4; }

  @media print {
    @page { size: 10in 5.625in; margin: 0; }
    body { background: #fff; }
    .toolbar { display: none !important; }
    .slide { margin: 0; box-shadow: none; page-break-after: always; }
    .slide:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a id="back-link" href="board.html">← К инструменту</a>
  <span class="sp"></span>
  <span style="font-size:12px;color:#8B90A8">Если PDF без цвета — включите «Фоновая графика» в диалоге печати</span>
  <span class="sh-host" id="sh-host" style="margin-right:4px"></span>
  <button class="btn-print" onclick="window.print()">Сохранить как PDF</button>
</div>

<div id="deck"></div>

<script src="data/instruments.js?v=fx4"></script>
<script src="data/lib.js?v=fx4"></script>
<script src="data/offerings.js?v=cln1"></script>
<script src="share.js?v=3"></script>
<script>
  const S = window.SITE;
  const qs = new URLSearchParams(location.search);

  // Режим размещения: ?offering=<id> строит one-pager из data/offerings.js (напр. структурная CLN).
  const OFF = window.OFFERINGS;
  const offId = qs.get("offering");
  const offering = (offId && OFF && OFF.items) ? OFF.items.find(o => o.id === offId) : null;

  let inst, nom, q, name, backHref, backText, isForeign;
  if (offering) {
    q = offering.price; nom = 1000000; name = offering.name;
    inst = { type: "offering", underlying: offering.reference, expiry: offering.maturity };
    isForeign = false;
    backHref = "offerings.html"; backText = "← К размещению";
  } else {
    inst = S.findInstrument(qs.get("id"));
    nom = inst.minNom; q = inst.quote; name = S.displayName(inst);
    isForeign = S.isFxSensitive(inst.underlying);
    backHref = "board.html#" + encodeURIComponent(inst.id); backText = "← К инструменту";
  }
  const U = S.underlyingInfo(inst.underlying);
  const fxShort = "Расчёт в валюте базового актива — изменение курса рубля к ней не учтено.";

  document.title = "One-pager — " + name;
  { const bl = document.getElementById("back-link"); bl.href = backHref; bl.textContent = backText; }

  const today = new Date();
  const dateS = ("0" + today.getDate()).slice(-2) + "." + ("0" + (today.getMonth() + 1)).slice(-2) + "." + today.getFullYear();
  const starSvg = (s, f) => '<svg width="' + s + '" height="' + s + '" viewBox="0 0 26 26" fill="none"><path d="M13 1 L15.6 10.4 L25 13 L15.6 15.6 L13 25 L10.4 15.6 L1 13 L10.4 10.4 Z" fill="' + f + '"/></svg>';
  const QUAL = "Только для квалифицированных инвесторов<br>Не является инвестиционной рекомендацией";

  function underDesc() {
    return S.underlyingLong(inst.underlying) || (U && U.desc) ||
      (inst.underlying + " — базовый актив, от динамики которого зависит выплата по продукту.");
  }

  // ── Диаграммы выплат ──
  const CW = 420, CH = 124, PAD = 16;
  const MONO = 'font-family="JetBrains Mono, monospace"';
  const C = { line: "#1B2153", or: "#EE7D1B", grid: "#E4E5F0", axis: "#CFD2E4", lab: "#8B90A8", lab2: "#5A6180" };

  function chWarrant() {
    const K = inst.strike, K2 = inst.strike2;
    const cap = K2 ? (K2 - K) / K * 100 : 0;
    const sBe = K * (1 + q / 100), s0 = K * 0.8;
    const s1 = K2 ? K2 * 1.18 : Math.max(K * 1.32, sBe * 1.15);
    const yMax = K2 ? cap + 10 : Math.max(34, S.PAYOFF.pct(s1, K) + 6);
    const x = s => PAD + ((s - s0) / (s1 - s0)) * (CW - PAD * 2);
    const y = v => CH - PAD - (v / yMax) * (CH - PAD * 2);
    let line = "M" + x(s0).toFixed(1) + " " + y(0).toFixed(1) + " L" + x(K).toFixed(1) + " " + y(0).toFixed(1);
    if (K2) line += " L" + x(K2).toFixed(1) + " " + y(cap).toFixed(1) + " L" + x(s1).toFixed(1) + " " + y(cap).toFixed(1);
    else line += " L" + x(s1).toFixed(1) + " " + y(S.PAYOFF.pct(s1, K)).toFixed(1);
    let capMark = "";
    if (K2) capMark = '<line x1="' + PAD + '" y1="' + y(cap) + '" x2="' + (CW - PAD) + '" y2="' + y(cap) + '" stroke="' + C.grid + '" stroke-width="1" stroke-dasharray="2 4"/>' +
      '<rect x="' + (x(K2) - 4) + '" y="' + (y(cap) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K2) + ' ' + y(cap) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(K2) + '" y="' + (y(cap) - 8) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K₂ ' + S.fmtSmart(K2) + ' · макс. ' + S.fmtSmart(cap) + '%</text>';
    // Простой колл: потолка нет — линия уходит вверх со стрелкой на конце + подпись
    const pathMarker = K2 ? "" : ' marker-end="url(#up-arrow)"';
    const upMark = K2 ? "" :
      '<text x="' + (CW - PAD) + '" y="11" text-anchor="end" fill="' + C.line + '" font-size="10" ' + MONO + '>рост не ограничен</text>';
    const beEnd = x(sBe) > CW * 0.72;
    return '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">' +
      '<defs><marker id="up-arrow" markerWidth="11" markerHeight="10" refX="1.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L10 5 L0 10 Z" fill="' + C.line + '"/></marker></defs>' +
      '<line x1="' + PAD + '" y1="' + y(0) + '" x2="' + (CW - PAD) + '" y2="' + y(0) + '" stroke="' + C.grid + '" stroke-width="1"/>' +
      '<line x1="' + PAD + '" y1="' + y(q) + '" x2="' + (CW - PAD) + '" y2="' + y(q) + '" stroke="' + C.or + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(q) - 5) + '" fill="' + C.or + '" font-size="10" ' + MONO + '>премия ' + S.fmt1(q) + '%</text>' + capMark +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"' + pathMarker + '/>' + upMark +
      '<rect x="' + (x(K) - 4) + '" y="' + (y(0) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K) + ' ' + y(0) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(K) + '" y="' + (y(0) + 15) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K ' + S.fmtSmart(K) + '</text>' +
      '<circle cx="' + x(sBe) + '" cy="' + y(q) + '" r="4" fill="' + C.or + '"/>' +
      '<text x="' + (x(sBe) + (beEnd ? -7 : 7)) + '" y="' + (y(q) + 14) + '"' + (beEnd ? ' text-anchor="end"' : '') + ' fill="' + C.or + '" font-size="10" ' + MONO + '>б/у ' + S.fmtSmart(sBe) + '</text>' +
      '</svg>';
  }
  function chDiscount() {
    const base = CH - 34, pxPer = (CH - 74) / 110, barW = 78;
    const x1 = CW * 0.31 - barW / 2, x2 = CW * 0.69 - barW / 2;
    const h1 = q * pxPer, h2 = 100 * pxPer;
    return '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + base + '" x2="' + (CW - PAD) + '" y2="' + base + '" stroke="' + C.axis + '" stroke-width="1"/>' +
      '<line x1="' + (x1 + barW / 2) + '" y1="' + (base - h1) + '" x2="' + (x2 + barW) + '" y2="' + (base - h1) + '" stroke="' + C.or + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<rect x="' + x1 + '" y="' + (base - h1) + '" width="' + barW + '" height="' + h1 + '" rx="6" fill="#C6C9DE"/>' +
      '<rect x="' + x2 + '" y="' + (base - h2) + '" width="' + barW + '" height="' + h2 + '" rx="6" fill="' + C.line + '"/>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base - h1 - 7) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="12" ' + MONO + '>' + S.fmt2(q) + '%</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base - h2 - 7) + '" text-anchor="middle" fill="' + C.line + '" font-size="12" ' + MONO + '>100%</text>' +
      '<text x="' + ((x1 + barW + x2) / 2) + '" y="' + (base - h1 - 6) + '" text-anchor="middle" fill="' + C.or + '" font-size="10" ' + MONO + '>+' + S.fmt2(100 - q) + ' п.п.</text>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base + 15) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10">Покупка</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base + 15) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10">Погашение</text>' +
      '</svg>';
  }
  function chProtection(cfg) {
    const part = cfg.part, floor = cfg.floor, cap = cfg.cap;   // part 0..1; floor %; cap = макс. рост БА, % (или null)
    const capPay = cap != null ? 100 + part * cap : null;
    const pay = up => { let v = 100 + part * up; if (v < floor) v = floor; if (capPay != null && v > capPay) v = capPay; return v; };
    const upMin = -30, upMax = 40;
    const x = up => PAD + ((up - upMin) / (upMax - upMin)) * (CW - PAD * 2);
    const yLo = Math.min(floor, 100), yHi = Math.max(pay(upMax), 100), span = Math.max(yHi - yLo, 1);
    const yMin = yLo - span * 0.16, yMax = yHi + span * 0.20;
    const y = v => CH - PAD - ((v - yMin) / (yMax - yMin)) * (CH - PAD * 2);
    const upFloor = part ? (floor - 100) / part : 0;
    let bps = [upMin, 0, upMax];
    if (upFloor > upMin && upFloor < upMax) bps.push(upFloor);
    if (cap != null && cap > 0 && cap < upMax) bps.push(cap);
    bps = Array.from(new Set(bps)).sort((a, b) => a - b);
    const line = "M" + bps.map(u => x(u).toFixed(1) + " " + y(pay(u)).toFixed(1)).join(" L");
    const uncapped = cap == null;
    const midUp = (0 + (cap != null ? cap : upMax * 0.85)) / 2;
    let svg = '<svg viewBox="0 0 ' + CW + ' ' + CH + '" width="100%" style="display:block">';
    if (uncapped) svg += '<defs><marker id="up-arr" markerWidth="11" markerHeight="10" refX="1.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L10 5 L0 10 Z" fill="' + C.line + '"/></marker></defs>';
    svg += '<line x1="' + PAD + '" y1="' + y(floor) + '" x2="' + (CW - PAD) + '" y2="' + y(floor) + '" stroke="' + C.axis + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(floor) - 6) + '" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>' + (floor >= 100 ? 'защита 100%' : 'мин. ' + S.fmtSmart(floor) + '%') + '</text>';
    if (cap != null) svg += '<line x1="' + PAD + '" y1="' + y(capPay) + '" x2="' + (CW - PAD) + '" y2="' + y(capPay) + '" stroke="' + C.axis + '" stroke-width="1" stroke-dasharray="2 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(capPay) - 5) + '" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>потолок ' + S.fmtSmart(capPay) + '%</text>' +
      '<rect x="' + (x(cap) - 4) + '" y="' + (y(capPay) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(cap) + ' ' + y(capPay) + ')" fill="' + C.line + '"/>';
    svg += '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"' + (uncapped ? ' marker-end="url(#up-arr)"' : '') + '/>';
    if (uncapped) svg += '<text x="' + (CW - PAD) + '" y="11" text-anchor="end" fill="' + C.line + '" font-size="10" ' + MONO + '>рост не ограничен</text>';
    svg += '<rect x="' + (x(0) - 4) + '" y="' + (y(100) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(0) + ' ' + y(100) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(0) + '" y="' + (y(100) + 15) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>S₀</text>';
    if (floor < 100 && upFloor > upMin) svg += '<rect x="' + (x(upFloor) - 3.5) + '" y="' + (y(floor) - 3.5) + '" width="7" height="7" transform="rotate(45 ' + x(upFloor) + ' ' + y(floor) + ')" fill="#C0561A"/>';
    svg += '<text x="' + x(midUp) + '" y="' + (y(pay(midUp)) - 9) + '" text-anchor="middle" fill="' + C.or + '" font-size="10" ' + MONO + '>участие ' + Math.round(part * 100) + '%</text>';
    return svg + '</svg>';
  }

  // ── Контент ──
  let c = {};
  if (offering) {
    const buyRub = nom * q / 100;
    c = {
      badge: offering.kind,
      subtitle: offering.teaser,
      quoteK: "цена размещения · % от номинала",
      chart: chDiscount,
      chartCap: "Покупка по " + S.fmt2(q) + "% номинала, погашение по 100% — при отсутствии кредитного события по " + offering.reference + ". Доход — дисконт, зафиксированный в день сделки.",
      params: [
        ["Дисконт к погашению", "+" + S.fmt2(100 - q) + " п.п.", true],
        ["Погашение", "100% номинала", false],
        ["Привязка", offering.reference, false],
        ["Срок", offering.tenor, false]
      ],
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · покупка по " + S.fmt2(q) + "% = " + S.fmtInt(buyRub) + " ₽",
      scen: [
        ["Нет кредитного события", "погашение 100% номинала", "+" + S.fmtInt(nom - buyRub) + " ₽", "var(--up)"],
        ["Кредитное событие · " + offering.reference, "выплата ниже номинала", "вплоть до 0 ₽", "var(--down)"]
      ],
      explainer: "Дисконтная структурная облигация (CLN) с привязкой к кредитному качеству " + offering.reference + ". Покупается по " + S.fmt2(q) + "% номинала; при отсутствии кредитного события по контрольному лицу погашается по 100% номинала. Доход — дисконт, зафиксированный в день сделки; купона нет.",
      underLabel: "Главный риск · кредитное событие",
      underDesc: "Кредитный риск на контрольное лицо — " + offering.reference + ". При кредитном событии (банкротство, неплатёж, реструктуризация обязательства) выплата при погашении может быть меньше номинала — вплоть до нуля."
    };
  } else if (inst.type === "warrant") {
    const isCS = inst.structure === "cs";
    const K = inst.strike, K2 = inst.strike2;
    const capPct = isCS ? (K2 - K) / K * 100 : 0;
    const premiumRub = nom * q / 100;
    const upPct = isCS ? Math.max(5, Math.floor((capPct * 0.75) / 5) * 5) : 30;
    const payout1 = nom * S.PAYOFF.pct(K * (1 + upPct / 100), K, K2) / 100;
    const net1 = payout1 - premiumRub;
    const params = [["Страйк (K)", S.fmtSmart(K) + "% нач. уровня", false]];
    if (isCS) params.push(["Потолок (K₂)", S.fmtSmart(K2) + "% · до " + S.fmtSmart(capPct) + "%", false]);
    else params.push(["Макс. убыток", "премия", false]);
    params.push(["Срок", inst.tenor, false], ["Экспозиция", "100% номинала", false]);
    c = {
      badge: isCS ? "Колл-спред · структурная облигация" : "CALL · структурная облигация",
      subtitle: "Заработать на росте " + inst.underlying + " с полной экспозицией на номинал и риском, ограниченным премией.",
      chart: chWarrant, params,
      chartCap: isCS
        ? "Выплата в % от номинала; уровень БА — в % от начального. Выше K₂ не растёт (макс. " + S.fmtSmart(capPct) + "%). Пунктир — премия; б/у — безубыток."
        : "Выплата в % от номинала; уровень БА — в % от начального. Рост выплаты не ограничен потолком. Пунктир — премия; б/у — безубыток.",
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · премия " + S.fmt2(q) + "% = " + S.fmtInt(premiumRub) + " ₽",
      scen: [
        [inst.underlying + " вырос на " + upPct + "%", "выплата " + S.fmtInt(payout1) + " ₽", (net1 >= 0 ? "+" : "−") + S.fmtInt(Math.abs(net1)) + " ₽", net1 >= 0 ? "var(--up)" : "var(--down)"],
        [inst.underlying + " не вырос", "выплаты нет — максимум убытка", "−" + S.fmtInt(premiumRub) + " ₽", "var(--down)"]
      ],
      explainer: isCS
        ? "Колл-спред — CALL с потолком выплаты. Страйк фиксируется по уровню актива в день покупки, рост засчитывается до K₂. Инвестор платит только премию (" + S.fmt2(q) + "% номинала) и получает экспозицию на весь номинал. Если актив не вырос — теряется только премия."
        : "CALL-варрант — право на выплату, равную росту базового актива сверх страйка. Инвестор платит только премию (" + S.fmt2(q) + "% номинала) и получает экспозицию на весь номинал без маржин-коллов. Если актив не вырос — теряется только премия."
    };
  } else if (inst.type === "discount") {
    const buyRub = nom * q / 100;
    c = {
      badge: "Дисконтная облигация",
      subtitle: "Покупка дешевле номинала, погашение по 100% — доход зафиксирован в день сделки.",
      chart: chDiscount,
      chartCap: "Покупка дешевле номинала, погашение по 100%. Доход — разница, зафиксированная в момент покупки.",
      params: [["Доходность", S.fmt1(S.yieldAnnual(inst)) + "% год.", true], ["Выплата", "100% номинала", false], ["Осталось", S.daysTo(inst.expiry) + " дн.", false], ["Купоны", "нет", false]],
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · покупка по " + S.fmt2(q) + "% = " + S.fmtInt(buyRub) + " ₽",
      scen: [
        ["Дождались погашения", "выплата 100% номинала", "+" + S.fmtInt(nom - buyRub) + " ₽", "var(--up)"],
        ["Продали раньше срока", "по текущей рыночной цене", "по рынку", "var(--nav)"]
      ],
      explainer: "Облигация покупается дешевле номинала — по " + S.fmt2(q) + "% от него. На дату погашения выплачивается полный номинал, 100%. Весь доход — дисконт: разница между ценой покупки и номиналом, известная в день сделки. Купонов нет; основной риск — кредитное качество эмитента."
    };
  } else {
    // Защита капитала. Конфиг из полей инструмента + опциональные override в URL (?protect / ?part / ?cap).
    const numq = k => { const v = parseFloat(qs.get(k)); return isFinite(v) ? v : null; };
    let part = inst.participation != null ? inst.participation : 0.6;   // 0..1
    let floor = inst.protectionPct != null ? inst.protectionPct : 100;  // % защиты капитала
    let cap = inst.cap != null ? inst.cap : null;                       // потолок = макс. рост БА, % (или null)
    const oPart = numq("part"); if (oPart != null && oPart > 0) part = oPart / 100;
    const oProt = numq("protect"); if (oProt != null && oProt > 0 && oProt <= 100) floor = oProt;
    const oCap = numq("cap"); if (oCap != null) cap = oCap > 0 ? oCap : null;

    const clamp = (v, lo, hi) => { v = Math.max(v, lo); if (hi != null) v = Math.min(v, hi); return v; };
    const capPay = cap != null ? Math.round(100 + part * cap) : null;
    const partPct = Math.round(part * 100);
    const entryRub = nom * q / 100;
    const upPct = 20, downPct = 20;
    const payUpPct = clamp(100 + part * upPct, floor, capPay);
    const payUpRub = nom * payUpPct / 100, netUp = payUpRub - entryRub;
    const payDownPct = clamp(100 - part * downPct, floor, capPay);
    const downRub = nom * payDownPct / 100;

    let subtitle, chartCap, explainer;
    if (floor >= 100 && cap == null) subtitle = "Возврат 100% номинала при любом падении и участие в росте " + inst.underlying + " без потолка.";
    else if (floor >= 100) subtitle = "Полная защита номинала и участие в росте " + inst.underlying + " — с потолком выплаты " + capPay + "%.";
    else if (cap == null) subtitle = "Гарантированный минимум " + S.fmtSmart(floor) + "% номинала и участие в росте " + inst.underlying + " без потолка.";
    else subtitle = "Гарантированный минимум " + S.fmtSmart(floor) + "% номинала и участие в росте " + inst.underlying + " с потолком " + capPay + "%.";

    chartCap = "Выплата в % от номинала. " +
      (floor >= 100 ? "Ниже S₀ — не меньше 100%." : "Гарантированный минимум — " + S.fmtSmart(floor) + "% (макс. убыток " + S.fmtSmart(100 - floor) + "%).") +
      " Выше S₀ — " + partPct + "% роста" + (cap != null ? " до потолка " + capPay + "%." : ", без потолка.");

    explainer = "Нота возвращает " + (floor >= 100 ? "100% номинала при любом сценарии" : "не менее " + S.fmtSmart(floor) + "% номинала (риск ограничен " + S.fmtSmart(100 - floor) + "%)") +
      ". Если " + inst.underlying + " вырос — " + (partPct === 100 ? "засчитывается весь его рост" : "сверху выплачивается " + partPct + "% его роста") +
      (cap != null ? ", но не выше потолка " + capPay + "% номинала" : ", без ограничения сверху") + ". Основной риск — кредитный риск эмитента ноты.";

    c = {
      badge: "Нота · защита капитала",
      subtitle: subtitle,
      chart: () => chProtection({ part: part, floor: floor, cap: cap }),
      chartCap: chartCap,
      params: [
        ["Защита капитала", S.fmtSmart(floor) + "%", false],
        ["Участие в росте", partPct + "%", true],
        ["Потолок", cap != null ? "+" + S.fmtSmart(cap) + "%" : "нет", false],
        ["Срок · погашение", inst.expiry, false]
      ],
      exIntro: "Номинал " + S.fmtInt(nom) + " ₽ · вход по " + S.fmt2(q) + "% = " + S.fmtInt(entryRub) + " ₽",
      scen: [
        [inst.underlying + " вырос на " + upPct + "%", "выплата " + S.fmtSmart(payUpPct) + "% номинала", (netUp >= 0 ? "+" : "−") + S.fmtInt(Math.abs(netUp)) + " ₽", netUp >= 0 ? "var(--up)" : "var(--down)"],
        floor >= 100
          ? [inst.underlying + " упал", "защита — 100% номинала", S.fmtInt(downRub) + " ₽", "var(--nav)"]
          : [inst.underlying + " упал на " + downPct + "%", "минимум — " + S.fmtSmart(floor) + "% номинала", S.fmtInt(downRub) + " ₽", "var(--down)"]
      ],
      explainer: explainer
    };
  }

  // ── Строительные блоки слайда 2 ──
  const howHTML =
    '<div class="callout"><div class="lbl">Как устроен продукт</div><div class="expl">' + c.explainer + '</div>' +
      '<div class="under"><div class="lbl">' + (c.underLabel || ('О базовом активе · ' + inst.underlying)) + '</div>' +
        '<div class="expl">' + (c.underDesc || underDesc()) + '</div></div></div>';
  const chartHTML = '<div class="chart-box"><div class="ct">Диаграмма выплат</div>' + c.chart() + '<div class="chart-cap">' + c.chartCap + '</div></div>';
  const paramsHTML = cols => '<div class="params c' + cols + '">' + c.params.map(p =>
    '<div class="param"><div class="v' + (p[2] ? " or" : "") + '">' + p[1] + '</div><div class="k">' + p[0] + '</div></div>').join("") + '</div>';
  const exampleHTML = scenCols => '<div class="example"><div class="lbl">Пример расчёта</div><div class="ex-intro">' + c.exIntro + '</div>' +
    '<div class="scen c' + scenCols + '">' + c.scen.map(s => '<div class="scard"><div><div class="st">' + s[0] + '</div><div class="sd">' + s[1] + '</div></div><div class="sr" style="color:' + s[3] + '">' + s[2] + '</div></div>').join("") + '</div>' +
    (isForeign ? '<div class="fx-inline">' + fxShort + '</div>' : '') + '</div>';

  // Двухколоночная парадигма: слева описание + компактные параметры, справа диаграмма + пример
  const bodyHTML =
    '<div class="c-row">' +
      '<div class="col between">' + howHTML + paramsHTML(2) + '</div>' +
      '<div class="col between">' + chartHTML + exampleHTML(1) + '</div>' +
    '</div>';

  let html = "";

  // Слайд 1 — титул
  html += '<section class="slide t-slide">' +
    '<div class="t-blocks"><i style="top:150px;right:0;width:56px;height:104px"></i><i style="top:264px;right:0;width:28px;height:28px;opacity:.5"></i></div>' +
    '<div class="t-top"><div class="brand">' + starSvg(20, "#EE7D1B") + ' Структурные продукты</div><div class="qual">' + QUAL + '</div></div>' +
    '<div><div class="t-badge">' + c.badge + '</div><div class="t-title">' + name + '</div><div class="t-bar"></div></div>' +
    '<div class="t-meta">' + dateS + '</div>' +
    '</section>';

  // Слайд 2 — описание
  html += '<section class="slide">' +
    '<div class="c-head"><div><div class="c-title">' + name + '</div><span class="c-badge">' + c.badge + '</span>' +
      '<div class="c-sub">' + c.subtitle + '</div></div>' +
      '<div class="c-quote"><div class="v">' + S.fmt2(q) + '%</div><div class="k">' + (c.quoteK || "котировка · % от номинала") + '</div></div></div>' +
    '<div class="c-body">' + bodyHTML + '</div>' +
    '<div class="c-foot">Пример иллюстративный, без учёта комиссий и налогов.</div>' +
    '</section>';

  // Слайд 3 — дисклеймер
  html += '<section class="slide d-slide">' +
    '<div><div class="d-title">Ограничение ответственности</div><div class="d-bar"></div></div>' +
    '<div class="d-body">' + (isForeign ? [S.LEGAL.fx].concat(S.LEGAL.onepager) : S.LEGAL.onepager).map(p => "<p>" + p + "</p>").join("") + '</div>' +
    '<div class="d-meta">' + dateS + ' · Структурные продукты</div>' +
    '</section>';

  document.getElementById("deck").innerHTML = html;

  { const shHost = document.getElementById("sh-host");
    if (shHost && window.Share) {
      const shareUrl = offering
        ? new URL("onepager.html?offering=" + encodeURIComponent(offering.id), location.href).href
        : new URL("onepager.html?id=" + encodeURIComponent(inst.id), location.href).href;
      const rows = ["• Цена входа: " + S.fmt2(q) + "% ном."].concat((c.params || []).map(p => "• " + p[0] + ": " + p[1]));
      const shareText = name + "\n\n" + c.subtitle + "\n\n" + rows.join("\n");
      Share.attach(shHost, { url: shareUrl, title: name, text: shareText });
    } }

  if (qs.get("print") === "1") {
    (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve())
      .then(() => setTimeout(() => window.print(), 400));
  }
</script>
</body>
</html>
