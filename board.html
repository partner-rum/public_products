<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Доска инструментов — структурные продукты</title>
<meta name="description" content="Доска инструментов: котировки в процентах от номинала, ключевые параметры и сроки.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F4F2F0; --card: #FFFFFF;
    --black: #1A1919;
    --ink: #0C0A08; --hushed: rgba(12,10,8,0.6); --faint: rgba(12,10,8,0.38);
    --border: #D2CECB; --border-soft: #E0DCD6;
    --solar: #E4F222; --solar-l: #F5FF78;
    --spruce: #2E6E56; --steel: #33608C; --amber: #B3801F;
    --up: #1F7A53; --down: #E96516;
    --f-body: 'Onest', system-ui, sans-serif;
    --f-mono: 'JetBrains Mono', Consolas, monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--ink); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  a:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 4px; }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 44px; }

  .nav { position: sticky; top: 0; z-index: 20; background: rgba(244,242,240,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav-in { max-width: 1160px; margin: 0 auto; padding: 0 44px; height: 62px; display: flex; align-items: center; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-name { font-size: 14.5px; font-weight: 600; }
  .topnav { margin-left: auto; display: flex; align-items: center; gap: 22px; font-size: 14px; font-weight: 500; }
  .topnav a { color: var(--hushed); transition: color .2s; }
  .topnav a:hover { color: var(--ink); }
  .topnav a[aria-current="page"] { color: var(--ink); font-weight: 600; }
  .btn-solar { background: var(--solar); color: var(--ink) !important; border-radius: 6px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 7px; transition: background .3s ease-in-out; }
  .btn-solar:hover { background: var(--solar-l); }

  .crumbs { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--hushed); padding: 26px 0 0; }
  .crumbs a:hover { color: var(--ink); }
  .crumbs .sep { color: #C4BFB8; }
  .crumbs .here { color: var(--ink); font-weight: 500; }

  /* Переключатель семейств */
  .fams { display: flex; gap: 6px; margin: 22px 0 30px; border-bottom: 1px solid var(--border-soft); }
  .fam { position: relative; padding: 10px 16px 12px; font-size: 14px; font-weight: 500; color: var(--hushed); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .fam:hover { color: var(--ink); }
  .fam.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--fc); }
  .fam .n { font-family: var(--f-mono); font-size: 11px; color: var(--faint); margin-left: 6px; }

  .head { display: flex; flex-direction: column; gap: 12px; max-width: 760px; }
  .head-row { display: flex; align-items: center; gap: 14px; }
  h1 { margin: 0; font-size: 34px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; }
  .chip { font-size: 12px; font-weight: 600; border-radius: 999px; padding: 4px 11px; }
  .desc { font-size: 15px; line-height: 1.6; color: var(--hushed); text-wrap: pretty; }

  .count { font-family: var(--f-mono); font-size: 12px; color: var(--hushed); margin: 28px 0 10px; }

  .table { background: var(--card); border: 1px solid var(--border-soft); border-radius: 12px; overflow: hidden; }
  .thead, .row { display: grid; grid-template-columns: 2fr 1.1fr 1fr 0.9fr 1fr 1fr; align-items: center; }
  .thead { background: #EFECE6; border-bottom: 1px solid var(--border-soft); }
  .th { padding: 11px 18px; font-family: var(--f-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--hushed); }
  .row { border-top: 1px solid #E7E3DD; }
  .row:first-child { border-top: none; }
  .row:hover { background: #FAF8F5; }
  .cell { padding: 14px 18px; }
  .num { text-align: right; font-family: var(--f-mono); }
  .r { text-align: right; }
  .name { font-size: 14px; font-weight: 600; }
  .sub { font-family: var(--f-mono); font-size: 11px; color: var(--faint); margin-top: 3px; }
  .asset { font-size: 13.5px; color: var(--ink); }
  .asset-sub { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
  .group { padding: 18px 18px 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--hushed); border-top: 1px solid #E7E3DD; }
  .mx .group { display: flex; align-items: baseline; gap: 10px; padding: 16px 18px 12px; font-size: 16px; font-weight: 700; letter-spacing: -0.005em; text-transform: none; color: var(--ink); background: #EFECE6; border-top: 1px solid var(--border-soft); }
  .group-meta { font-family: var(--f-mono); font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); font-size: 10.5px; }
  /* Матрица варрантов: строки — пэйоффы, колонки — сроки */
  .mx .thead, .mx .row { grid-template-columns: 1.4fr 1fr 1fr 1fr; }
  .mx .row:hover { background: transparent; }
  .th-sub { font-family: var(--f-mono); font-size: 10.5px; font-weight: 400; letter-spacing: 0; text-transform: none; color: var(--faint); margin-top: 3px; }
  a.mx-cell:hover, a.mx-label:hover { background: #FAF8F5; }
  a.mx-label .name { border-bottom: 1px dotted #C4BFB8; padding-bottom: 1px; display: inline-block; }
  .mx-quote { font-family: var(--f-mono); font-size: 14.5px; }
  .mx-none { color: var(--faint); }
  .disclaimer { margin-top: 24px; font-size: 12.5px; line-height: 1.5; color: var(--faint); max-width: 560px; }
  .pagefoot { padding-bottom: 64px; }

  @media (max-width: 900px) {
    .wrap { padding: 0 20px; }
    h1 { font-size: 27px; }
    .fams { overflow-x: auto; }
    .fam { white-space: nowrap; }
    .thead, .row { grid-template-columns: 1.6fr 1fr 1fr; }
    .th:nth-child(n+4), .cell:nth-child(n+4) { display: none; }
    .mx .thead, .mx .row { grid-template-columns: 1.2fr 1fr 1fr 1fr; }
    .mx .th:nth-child(n+4), .mx .cell:nth-child(n+4) { display: block; }
    .mx .th, .mx .cell { padding: 12px 10px; }
  }
  @media (max-width: 860px) {
    .nav-in { height: auto; flex-wrap: wrap; padding: 12px 20px; row-gap: 10px; }
    .topnav { margin-left: 0; width: 100%; gap: 16px; font-size: 13.5px; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html" aria-label="На главную">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <path d="M13 1 L15.6 10.4 L25 13 L15.6 15.6 L13 25 L10.4 15.6 L1 13 L10.4 10.4 Z" fill="#1A1919"/>
      </svg>
      <span class="brand-name">Структурные продукты</span>
    </a>
    <nav class="topnav">
      <a href="digest.html">Дайджест</a>
      <a href="placements.html">Выпуски</a>
      <a href="about.html">Об устройстве</a>
      <a class="btn-solar" href="board.html?type=warrant">Доска
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7 H12 M8 3 L12 7 L8 11" stroke="#0C0A08" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </nav>
  </div>
</header>

<div class="wrap pagefoot">

  <div class="crumbs">
    <a href="index.html">Главная</a>
    <span class="sep">/</span>
    <span class="here" id="crumb-type"></span>
  </div>

  <nav class="fams" id="fams" aria-label="Семейства продуктов"></nav>

  <div class="head">
    <div class="head-row">
      <h1 id="type-title"></h1>
      <span class="chip" id="type-chip"></span>
    </div>
    <div class="desc" id="type-desc"></div>
  </div>

  <div class="count" id="count"></div>

  <div class="table">
    <div class="thead" id="thead">
      <div class="th">Инструмент</div>
      <div class="th">Базовый актив</div>
      <div class="th r">Котировка, % ном.</div>
      <div class="th r">Изм., п.п.</div>
      <div class="th r" id="param-label"></div>
      <div class="th r">Экспирация</div>
    </div>
    <div id="rows"></div>
  </div>

  <div class="disclaimer">Не является индивидуальной инвестиционной рекомендацией. Котировки — демонстрационные.</div>

</div>

<script src="data/instruments.js"></script>
<script src="data/lib.js"></script>
<script>
  const S = window.SITE;
  const qs = new URLSearchParams(location.search);
  const type = S.TYPES[qs.get("type")] ? qs.get("type") : "warrant";
  const t = S.TYPES[type];
  const FAM_COLORS = { discount: "#2E6E56", protection: "#33608C", warrant: "#B3801F" };

  document.title = t.title + " — структурные продукты";
  document.getElementById("crumb-type").textContent = t.title;
  document.getElementById("type-title").textContent = t.title;
  const chip = document.getElementById("type-chip");
  chip.textContent = t.chip;
  chip.style.color = t.chipFg;
  chip.style.background = t.chipBg;
  document.getElementById("type-desc").textContent = t.desc;
  document.getElementById("param-label").textContent = t.paramLabel;

  // Переключатель семейств с количеством инструментов
  document.getElementById("fams").innerHTML = Object.keys(S.TYPES).map(k =>
    '<a class="fam' + (k === type ? " active" : "") + '" style="--fc:' + FAM_COLORS[k] + '" href="board.html?type=' + k + '">' +
      S.TYPES[k].title + '<span class="n">' + S.instrumentsOfType(k).length + '</span></a>').join("");

  const list = S.instrumentsOfType(type);
  document.getElementById("count").textContent = "инструментов: " + list.length;
  const rowsEl = document.getElementById("rows");

  if (type === "warrant") {
    // Матрица: группа — БА; строки — пэйоффы; колонки — сроки.
    // Экспирация одна на срок, поэтому показывается один раз — в шапке колонки.
    document.querySelector(".table").classList.add("mx");

    const tenors = [];
    list.forEach(r => { if (!tenors.some(t => t.tenor === r.tenor)) tenors.push({ tenor: r.tenor, expiry: r.expiry }); });

    const groups = [];
    list.forEach(r => {
      let g = groups.find(x => x.u === r.underlying);
      if (!g) { g = { u: r.underlying, cls: r.cls, uRef: r.uRef, cells: {} }; groups.push(g); }
      g.cells[r.structure + "|" + r.tenor] = r;
    });

    const STRUCTS = [
      { key: "call", label: "CALL 100", sub: "рост без потолка" },
      { key: "cs",   label: "CS 100–150", sub: "рост до +50%" }
    ];

    document.getElementById("thead").innerHTML =
      '<div class="th">Пэйофф<div class="th-sub">цена — премия, % ном.</div></div>' +
      tenors.map(t => '<div class="th r">' + t.tenor + '</div>').join("");

    rowsEl.innerHTML = groups.map(g =>
      '<div class="group">' + g.u + '<span class="group-meta">' + g.cls + '</span></div>' +
      STRUCTS.map(s => {
        const first = tenors.map(t => g.cells[s.key + "|" + t.tenor]).find(Boolean);
        return '<div class="row">' +
          '<a class="cell mx-label" href="instrument.html?id=' + encodeURIComponent(first ? first.id : "") + '">' +
            '<div class="name">' + s.label + '</div><div class="asset-sub">' + s.sub + '</div></a>' +
          tenors.map(t => {
            const r = g.cells[s.key + "|" + t.tenor];
            if (!r) return '<div class="cell r mx-none">—</div>';
            return '<a class="cell r mx-cell" href="instrument.html?id=' + encodeURIComponent(r.id) + '">' +
              '<div class="mx-quote">' + S.fmt2(r.quote) + '%</div></a>';
          }).join("") + '</div>';
      }).join("")
    ).join("");
  } else {
    let lastGroup = null;
    rowsEl.innerHTML = list.map(r => {
      const up = r.chg > 0;
      let head = "";
      if (list.length > 6 && r.underlying !== lastGroup) {
        head = '<div class="group">' + r.underlying + '</div>';
        lastGroup = r.underlying;
      }
      return head + '<a class="row" href="instrument.html?id=' + encodeURIComponent(r.id) + '">' +
        '<div class="cell"><div class="name">' + S.displayName(r) + '</div></div>' +
        '<div class="cell"><div class="asset">' + r.underlying + '</div><div class="asset-sub">' + r.cls + '</div></div>' +
        '<div class="cell num" style="font-size:14px">' + S.fmt2(r.quote) + '%</div>' +
        '<div class="cell r" style="font-size:13.5px;font-weight:600;color:' + (up ? "#1F7A53" : "#E96516") + '">' + (up ? "+" : "−") + S.fmt1(Math.abs(r.chg)) + '</div>' +
        '<div class="cell num" style="font-size:13.5px;color:var(--hushed)">' + S.paramValue(r) + '</div>' +
        '<div class="cell r" style="font-size:13.5px;color:var(--hushed)">' + r.expiry + '</div>' +
      '</a>';
    }).join("");
  }
</script>
</body>
</html>
