<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Текущие продукты — структурные продукты</title>
<meta name="description" content="Текущие продукты: котировки в процентах от номинала, диаграммы выплат и параметры по каждому инструменту.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F4F2F0; --card: #FFFFFF;
    --black: #1A1919;
    --ink: #0C0A08; --hushed: rgba(12,10,8,0.6); --faint: rgba(12,10,8,0.38);
    --border: #D2CECB; --border-soft: #E0DCD6;
    --solar: #E4F222; --solar-l: #F5FF78;
    --spruce: #2E6E56; --steel: #33608C; --amber: #B3801F;
    --up: #1F7A53; --down: #E96516;
    --f-body: 'Onest', system-ui, sans-serif;
    --f-mono: 'JetBrains Mono', Consolas, monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--ink); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 4px; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 44px 40px; }

  .nav { position: sticky; top: 0; z-index: 20; background: rgba(244,242,240,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav-in { max-width: 1280px; margin: 0 auto; padding: 0 44px; height: 62px; display: flex; align-items: center; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-name { font-size: 14.5px; font-weight: 600; }
  .topnav { margin-left: auto; display: flex; align-items: center; gap: 22px; font-size: 14px; font-weight: 500; }
  .topnav a { color: var(--hushed); transition: color .2s; }
  .topnav a:hover { color: var(--ink); }
  .topnav a[aria-current="page"] { color: var(--ink); font-weight: 600; }
  .btn-solar { background: var(--solar); color: var(--ink) !important; border-radius: 6px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 7px; transition: background .3s ease-in-out; }
  .btn-solar:hover { background: var(--solar-l); }

  /* ── Полоса под шапкой: «пульс» рынка (тёмная, оранжевая линия, без данных) ── */
  .ticker { position: relative; height: 54px; overflow: hidden; background: #101114; border-bottom: 1px solid #23242B; }
  .ticker svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin: 26px 0 18px; }
  h1 { margin: 0; font-size: 30px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; }
  .count { font-family: var(--f-mono); font-size: 12px; color: var(--hushed); }

  .layout { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 20px; align-items: start; }

  /* ── Список слева ── */
  .aside { position: sticky; top: 78px; display: flex; flex-direction: column; max-height: calc(100dvh - 100px); }
  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .search { width: 100%; border: 1px solid var(--border); border-radius: 6px; background: var(--card); padding: 10px 12px; font-family: var(--f-body); font-size: 14px; color: var(--ink); }
  .search::placeholder { color: var(--faint); }
  .search:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
  .chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .kf { border: 1px solid var(--border); background: var(--card); border-radius: 6px; padding: 6px 12px; font-size: 12.5px; font-weight: 500; color: var(--hushed); cursor: pointer; font-family: var(--f-body); }
  .kf:hover { color: var(--ink); }
  .kf.active { background: var(--black); border-color: var(--black); color: #F4F2F0; font-weight: 600; }
  .kf .n { font-family: var(--f-mono); font-size: 10.5px; opacity: 0.75; margin-left: 4px; }

  .list { background: var(--card); border: 1px solid var(--border-soft); border-radius: 12px; overflow-y: auto; flex: 1; min-height: 0; }
  .group-h { display: flex; align-items: center; gap: 9px; width: 100%; border: none; border-top: 1px solid var(--border-soft); background: #EFECE6; cursor: pointer; font-family: var(--f-body); color: var(--ink); padding: 11px 14px; text-align: left; position: sticky; top: 0; z-index: 2; }
  .group-h:first-child { border-top: none; }
  .group-h .chev { transition: transform .2s var(--ease); color: var(--hushed); font-size: 11px; }
  .group-h.open .chev { transform: rotate(90deg); }
  .group-h .name { font-size: 13.5px; font-weight: 600; }
  .group-h .gc { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--hushed); }
  .group-items { display: none; }
  .group-items.open { display: block; }
  .item { display: block; width: 100%; text-align: left; border: none; border-top: 1px solid #F0EDE8; border-left: 3px solid transparent; background: transparent; cursor: pointer; font-family: var(--f-body); color: var(--ink); padding: 10px 14px 10px 12px; }
  .item:hover { background: #FAF8F5; }
  .item.active { background: #FAF8F5; border-left-color: var(--solar); }
  .item .r1 { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .item .nm { font-size: 13.5px; font-weight: 600; }
  .item .q { font-family: var(--f-mono); font-size: 12px; white-space: nowrap; }
  .empty-list { padding: 22px 14px; font-size: 13px; color: var(--faint); }

  /* ── Паспорт справа ── */
  .panel-wrap { position: sticky; top: 78px; }
  .panel { background: var(--card); border: 1px solid var(--border-soft); border-radius: 12px; padding: 26px 28px; max-height: calc(100dvh - 100px); overflow-y: auto; }
  .panel-close { display: none; }

  .pp-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; flex-wrap: wrap; }
  .pp-title { font-size: 23px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; }
  .badge { display: inline-block; margin-top: 7px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); background: #E9E6E0; border-radius: 6px; padding: 3px 8px; }
  .pp-sub { margin-top: 8px; font-size: 13px; color: var(--hushed); max-width: 480px; }
  .quote-block { text-align: right; }
  .quote-big { font-family: var(--f-mono); font-size: 30px; font-weight: 500; letter-spacing: -0.02em; }
  .quote-sub { font-size: 11.5px; color: var(--faint); margin-top: 2px; }

  .chart-box { margin-top: 18px; border: 1px solid #F0EDE8; border-radius: 10px; padding: 14px 16px 10px; }
  .chart-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .chart-title { font-size: 13.5px; font-weight: 600; }
  .tabs { display: flex; gap: 4px; background: #E9E5DF; border-radius: 8px; padding: 3px; }
  .tab { border: none; border-radius: 6px; padding: 5px 13px; font-size: 12.5px; font-weight: 500; cursor: pointer; background: transparent; color: var(--hushed); font-family: var(--f-body); }
  .tab.active { font-weight: 600; background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(24,25,30,0.14); }
  .chart-caption { margin-top: 8px; font-size: 11.5px; line-height: 1.5; color: #A8A29B; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
  .metric { background: var(--canvas); border-radius: 8px; padding: 10px 12px; }
  .metric .v { font-family: var(--f-mono); font-size: 13.5px; }
  .metric .k { margin-top: 3px; font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase; color: #A8A29B; }

  .sec { margin-top: 20px; }
  .sec .h { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #6E6A68; padding-bottom: 8px; border-bottom: 1px solid #E7E3DD; margin-bottom: 4px; }
  .sec .intro { font-size: 13px; color: var(--hushed); margin: 8px 0 2px; }
  .scenario { display: grid; grid-template-columns: 1.3fr 1.3fr 0.6fr; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0EDE8; }
  .scenario .l { font-size: 13.5px; font-weight: 600; }
  .scenario .d { font-size: 12.5px; color: var(--hushed); }
  .scenario .r { text-align: right; font-family: var(--f-mono); font-size: 13.5px; }
  .explainer { font-size: 13.5px; line-height: 1.65; color: var(--hushed); margin: 10px 0 0; text-wrap: pretty; }
  .facts { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 14px; }
  .fact { min-width: 140px; max-width: 220px; }
  .fact .k { font-size: 10.5px; color: #A8A29B; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .fact .v { font-size: 13px; line-height: 1.45; }

  .pp-actions { margin-top: 22px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn-pdf { display: inline-flex; align-items: center; gap: 8px; background: var(--solar); color: var(--ink); border-radius: 6px; padding: 9px 16px; font-size: 13.5px; font-weight: 500; transition: background .3s ease-in-out; }
  .btn-pdf:hover { background: var(--solar-l); }
  .placeholder { display: grid; place-items: center; min-height: 300px; color: var(--faint); font-size: 14px; }
  .disclaimer { margin-top: 20px; font-size: 12px; line-height: 1.5; color: #A8A29B; }

  @media (max-width: 900px) {
    .wrap { padding: 0 16px 32px; }
    .layout { grid-template-columns: 1fr; }
    .aside { position: static; max-height: none; }
    .list { max-height: 60dvh; }
    .panel-wrap { display: none; position: fixed; inset: 0; z-index: 40; background: var(--canvas); padding: 14px; overflow: auto; }
    .panel-wrap.open { display: block; }
    .panel { max-height: none; }
    .panel-close { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--card); border-radius: 6px; padding: 8px 14px; font-family: var(--f-body); font-size: 13.5px; cursor: pointer; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .scenario { grid-template-columns: 1fr; gap: 3px; }
    .scenario .r { text-align: left; }
  }
  @media (max-width: 860px) {
    .nav-in { height: auto; flex-wrap: wrap; padding: 12px 20px; row-gap: 10px; }
    .topnav { margin-left: 0; width: 100%; gap: 16px; font-size: 13.5px; }
  }
</style>
</head>

<header class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html" aria-label="На главную">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none" aria-hidden="true">

    <nav class="topnav">

<script src="data/instruments.js?v=fx4"></script>
<script src="data/lib.js?v=fx4"></script>
<script>
  const S = window.SITE;
  const TYPE_LABEL = { discount: "Дисконтные облигации", protection: "Защита капитала", warrant: "Варранты" };

  let type = "all", q = "", selected = null, mode = "payoff";
  const openGroups = new Set();

  // ?type= из старых ссылок предвыбирает семейство
  const qsType = new URLSearchParams(location.search).get("type");
  if (S.TYPES[qsType]) type = qsType;

  // --- Графики (SVG строками, Ramp-палитра) ---
  const W = 560, H = 270, PAD = 26;
  const MONO = 'font-family="JetBrains Mono, monospace"';
  const C = { line: "#1A1919", gold: "#B3801F", grid: "#E5E1DB", axis: "#CFC9C2", lab: "#A8A29B", lab2: "#6E6A68" };

  function chartUnderlying(inst, U) {
    const data = U.history;
    const PADL = 56, PADR = 26, PADT = 24, PADB = 40;
    const min = Math.min(...data), max = Math.max(...data), rng = (max - min) || 1;
    const x = i => PADL + (i / (data.length - 1)) * (W - PADL - PADR);
    const y = v => PADT + (1 - (v - min) / rng) * (H - PADT - PADB);
    const pts = data.map((v, i) => [x(i), y(v)]);
    const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const area = line + " L" + x(data.length - 1).toFixed(1) + " " + (H - PADB) + " L" + PADL + " " + (H - PADB) + " Z";
    let grid = "";
    for (let g = 0; g <= 3; g++) {
      const val = max - (g / 3) * (max - min);
      const gy = y(val);
      grid += '<line x1="' + PADL + '" y1="' + gy.toFixed(1) + '" x2="' + (W - PADR) + '" y2="' + gy.toFixed(1) + '" stroke="' + C.grid + '" stroke-width="1"/>' +
        '<text x="' + (PADL - 7) + '" y="' + (gy + 4).toFixed(1) + '" text-anchor="end" fill="' + C.lab + '" font-size="10" ' + MONO + '>' + S.fmtSmart(val) + '</text>';
    }
    const MONTHS = ["янв", "фев", "мар", "апр", "май", "июн", "июл", "авг", "сен", "окт", "ноя", "дек"];
    const now = new Date();
    let xlab = "";
    for (let i = 0; i < data.length; i++) {
      if ((data.length - 1 - i) % 2) continue;
      const d = new Date(now.getFullYear(), now.getMonth() - (data.length - 1 - i), 1);
      xlab += '<text x="' + x(i).toFixed(1) + '" y="' + (H - PADB + 18) + '" text-anchor="middle" fill="' + C.lab + '" font-size="10" ' + MONO + '>' + MONTHS[d.getMonth()] + '</text>';
    }
    const axes = '<line x1="' + PADL + '" y1="' + (H - PADB) + '" x2="' + (W - PADR) + '" y2="' + (H - PADB) + '" stroke="' + C.axis + '" stroke-width="1"/>' +
      '<line x1="' + PADL + '" y1="' + PADT + '" x2="' + PADL + '" y2="' + (H - PADB) + '" stroke="' + C.axis + '" stroke-width="1"/>' +
      '<text x="' + (PADL - 7) + '" y="13" text-anchor="end" fill="' + C.lab + '" font-size="10" ' + MONO + '>' + (U.unit || "") + '</text>';
    const last = pts[pts.length - 1];
    const label = inst.uRef || (S.fmtSmart(data[data.length - 1]) + (U.unit ? " " + U.unit : ""));
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' + grid + axes + xlab +
      '<defs><linearGradient id="fillu" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="' + C.line + '" stop-opacity="0.10"/><stop offset="100%" stop-color="' + C.line + '" stop-opacity="0"/></linearGradient></defs>' +
      '<path d="' + area + '" fill="url(#fillu)"/>' +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="4" fill="' + C.line + '"/>' +
      '<text x="' + (W - PADR) + '" y="' + (last[1] - 11) + '" text-anchor="end" fill="' + C.line + '" font-size="11" ' + MONO + '>' + label + '</text>' +
      '</svg>';
  }

  function chartWarrant(inst) {
    const K = inst.strike, K2 = inst.strike2, q = inst.quote;
    const cap = K2 ? (K2 - K) / K * 100 : 0;
    const sBe = K * (1 + q / 100);
    const s0 = K * 0.8;
    const s1 = K2 ? K2 * 1.18 : Math.max(K * 1.32, sBe * 1.15);
    const yMax = K2 ? cap + 10 : Math.max(34, S.PAYOFF.pct(s1, K) + 6);
    const x = s => PAD + ((s - s0) / (s1 - s0)) * (W - PAD * 2);
    const y = v => H - PAD - (v / yMax) * (H - PAD * 2);
    let line = "M" + x(s0).toFixed(1) + " " + y(0).toFixed(1) + " L" + x(K).toFixed(1) + " " + y(0).toFixed(1);
    if (K2) line += " L" + x(K2).toFixed(1) + " " + y(cap).toFixed(1) + " L" + x(s1).toFixed(1) + " " + y(cap).toFixed(1);
    else line += " L" + x(s1).toFixed(1) + " " + y(S.PAYOFF.pct(s1, K)).toFixed(1);
    let capMark = "";
    if (K2) {
      capMark = '<line x1="' + PAD + '" y1="' + y(cap) + '" x2="' + (W - PAD) + '" y2="' + y(cap) + '" stroke="' + C.grid + '" stroke-width="1" stroke-dasharray="2 4"/>' +
        '<rect x="' + (x(K2) - 4) + '" y="' + (y(cap) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K2) + ' ' + y(cap) + ')" fill="' + C.line + '"/>' +
        '<text x="' + x(K2) + '" y="' + (y(cap) - 9) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K₂ ' + S.fmtSmart(K2) + ' · макс. ' + S.fmtSmart(cap) + '%</text>';
    }
    const beEnd = x(sBe) > W * 0.72;
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + y(0) + '" x2="' + (W - PAD) + '" y2="' + y(0) + '" stroke="' + C.grid + '" stroke-width="1"/>' +
      '<line x1="' + PAD + '" y1="' + y(q) + '" x2="' + (W - PAD) + '" y2="' + y(q) + '" stroke="' + C.gold + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(q) - 6) + '" fill="' + C.gold + '" font-size="10" ' + MONO + '>премия ' + S.fmt1(q) + '%</text>' +
      capMark +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<rect x="' + (x(K) - 4) + '" y="' + (y(0) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(K) + ' ' + y(0) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(K) + '" y="' + (y(0) + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>K ' + S.fmtSmart(K) + '</text>' +
      '<circle cx="' + x(sBe) + '" cy="' + y(q) + '" r="4" fill="' + C.gold + '"/>' +
      '<text x="' + (x(sBe) + (beEnd ? -7 : 7)) + '" y="' + (y(q) + 15) + '"' + (beEnd ? ' text-anchor="end"' : '') + ' fill="' + C.gold + '" font-size="10" ' + MONO + '>б/у ' + S.fmtSmart(sBe) + '</text>' +
      '</svg>';
  }

  function chartDiscount(inst) {
    const q = inst.quote;
    const base = H - 46, pxPer = (H - 96) / 110, barW = 100;
    const x1 = W * 0.31 - barW / 2, x2 = W * 0.69 - barW / 2;
    const h1 = q * pxPer, h2 = 100 * pxPer;
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + base + '" x2="' + (W - PAD) + '" y2="' + base + '" stroke="' + C.axis + '" stroke-width="1"/>' +
      '<line x1="' + (x1 + barW / 2) + '" y1="' + (base - h1) + '" x2="' + (x2 + barW) + '" y2="' + (base - h1) + '" stroke="' + C.gold + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<rect x="' + x1 + '" y="' + (base - h1) + '" width="' + barW + '" height="' + h1 + '" rx="7" fill="#DAD5CE"/>' +
      '<rect x="' + x2 + '" y="' + (base - h2) + '" width="' + barW + '" height="' + h2 + '" rx="7" fill="' + C.line + '"/>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base - h1 - 9) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="12" ' + MONO + '>' + S.fmt2(q) + '%</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base - h2 - 9) + '" text-anchor="middle" fill="' + C.line + '" font-size="12" ' + MONO + '>100%</text>' +
      '<text x="' + ((x1 + barW + x2) / 2) + '" y="' + (base - h1 - 8) + '" text-anchor="middle" fill="' + C.gold + '" font-size="10" ' + MONO + '>доход +' + S.fmt2(100 - q) + ' п.п.</text>' +
      '<text x="' + (x1 + barW / 2) + '" y="' + (base + 17) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="11">Покупка сегодня</text>' +
      '<text x="' + (x2 + barW / 2) + '" y="' + (base + 17) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="11">Погашение ' + inst.expiry + '</text>' +
      '</svg>';
  }

  function chartProtection(inst) {
    const part = inst.participation, yMin = 88, yMax = 130;
    const x = rel => PAD + ((rel - 0.7) / (1.4 - 0.7)) * (W - PAD * 2);
    const y = v => H - PAD - ((v - yMin) / (yMax - yMin)) * (H - PAD * 2);
    const endVal = 100 + part * 40;
    const line = "M" + x(0.7).toFixed(1) + " " + y(100).toFixed(1) + " L" + x(1.0).toFixed(1) + " " + y(100).toFixed(1) + " L" + x(1.4).toFixed(1) + " " + y(endVal).toFixed(1);
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' +
      '<line x1="' + PAD + '" y1="' + y(100) + '" x2="' + (W - PAD) + '" y2="' + y(100) + '" stroke="' + C.axis + '" stroke-width="1" stroke-dasharray="4 4"/>' +
      '<text x="' + (PAD + 2) + '" y="' + (y(100) + 15) + '" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>защита 100%</text>' +
      '<path d="' + line + '" fill="none" stroke="' + C.line + '" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<rect x="' + (x(1.0) - 4) + '" y="' + (y(100) - 4) + '" width="8" height="8" transform="rotate(45 ' + x(1.0) + ' ' + y(100) + ')" fill="' + C.line + '"/>' +
      '<text x="' + x(1.0) + '" y="' + (y(100) + 16) + '" text-anchor="middle" fill="' + C.lab2 + '" font-size="10" ' + MONO + '>S₀</text>' +
      '<text x="' + x(1.24) + '" y="' + (y(100 + part * 24) - 11) + '" fill="' + C.line + '" font-size="10" ' + MONO + '>участие ' + Math.round(part * 100) + '%</text>' +
      '</svg>';
  }

  // --- Контент паспорта (без дублей: котировка и изменение — только в шапке) ---
  function buildContent(inst) {
    const nom = inst.minNom;
    if (inst.type === "warrant") {
      const isCS = inst.structure === "cs";
      const K = inst.strike, K2 = inst.strike2;
      const premiumRub = nom * inst.quote / 100;
      const upPct = Math.max(16, Math.ceil((inst.quote + 6) / 5) * 5);
      const payout1 = nom * S.PAYOFF.pct(K * (1 + upPct / 100), K, K2) / 100;
      const net1 = payout1 - premiumRub;
      const capPct = isCS ? (K2 - K) / K * 100 : 0;
      const capRub = nom * capPct / 100;
      const metrics = [[S.fmtSmart(K) + "%", "страйк (K)"]];
      if (isCS) metrics.push([S.fmtSmart(K2) + "%", "потолок (K₂)"]);
      metrics.push([inst.tenor, "срок"], [inst.expiry, "экспирация"]);
      if (inst.uRef) metrics.push([inst.uRef, inst.underlying + " сегодня"]);
      metrics.push([S.fmtInt(nom) + " ₽", "мин. номинал"]);
      const scen = [
        [inst.underlying + " вырос на " + upPct + "%", "Выплата " + S.fmtInt(payout1) + " ₽", (net1 >= 0 ? "+" : "−") + S.fmtInt(Math.abs(net1)) + " ₽", net1 >= 0 ? "#1F7A53" : "#E96516"]
      ];
      if (isCS) {
        const capNet = capRub - premiumRub;
        scen.push([inst.underlying + " вырос на 70% — выше потолка", "Выплата " + S.fmtInt(capRub) + " ₽ — максимум", (capNet >= 0 ? "+" : "−") + S.fmtInt(Math.abs(capNet)) + " ₽", capNet >= 0 ? "#1F7A53" : "#E96516"]);
      }
      scen.push([inst.underlying + " не вырос", "Выплаты нет", "−" + S.fmtInt(premiumRub) + " ₽", "#E96516"]);
      return {
        badge: isCS ? "КОЛЛ-СПРЕД · ВАРРАНТ" : "CALL · ВАРРАНТ",
        subtitle: (isCS ? "Колл-спред на рост: " : "Варрант на рост: ") + inst.underlying + " · котировка — премия и максимальный риск покупателя",
        payoff: () => chartWarrant(inst),
        payoffCaption: isCS
          ? "Выплата на экспирацию в % от номинала; уровень БА — в % от начального. Выше K₂ выплата не растёт. Пунктир — премия; б/у — безубыточность."
          : "Выплата на экспирацию в % от номинала; уровень БА — в % от начального. Пунктир — премия; б/у — безубыточность.",
        metrics,
        exampleIntro: "Номинал " + S.fmtInt(nom) + " ₽ · премия " + S.fmt2(inst.quote) + "% = " + S.fmtInt(premiumRub) + " ₽",
        scenarios: scen,
        explainer: isCS
          ? "Колл-спред — CALL с потолком выплаты. Страйк K фиксируется по уровню базового актива в день покупки (100%), рост засчитывается до K₂ = " + S.fmtSmart(K2) + "%: максимальная выплата — " + S.fmtSmart(capPct) + "% номинала. За счёт ограничения премия ниже, чем у обычного CALL. Если актив не вырос — выплаты нет, потеря ограничена премией."
          : "CALL-варрант — право на выплату, равную росту базового актива. Страйк K фиксируется по уровню актива в день покупки (100%). Если на экспирацию актив выше страйка, выплата — Ном × рост. Если роста нет — выплаты нет, потеря ограничена премией.",
        facts: [
          ["Стиль", "Европейский — выплата на дату экспирации"],
          ["Максимальный убыток", "Уплаченная премия"]
        ]
      };
    }
    if (inst.type === "discount") {
      const buyRub = nom * inst.quote / 100;
      return {
        badge: "ДИСКОНТНАЯ ОБЛИГАЦИЯ",
        subtitle: "Покупка дешевле номинала, погашение по 100% — доход зафиксирован в день сделки",
        payoff: () => chartDiscount(inst),
        payoffCaption: "Покупка дешевле номинала, погашение по 100%. Доход — разница, зафиксированная в момент покупки.",
        metrics: [
          [S.fmt1(S.yieldAnnual(inst)) + "%", "доходность годовых"],
          ["100%", "выплата на погашение"],
          [inst.expiry, "погашение"],
          [S.daysTo(inst.expiry) + " дн.", "осталось"],
          [S.fmtInt(nom) + " ₽", "мин. номинал"]
        ],
        exampleIntro: "Номинал " + S.fmtInt(nom) + " ₽ · покупка по " + S.fmt2(inst.quote) + "% = " + S.fmtInt(buyRub) + " ₽",
        scenarios: [
          ["Дождались погашения " + inst.expiry, "Выплата " + S.fmtInt(nom) + " ₽ — 100% номинала", "+" + S.fmtInt(nom - buyRub) + " ₽", "#1F7A53"],
          ["Продали раньше срока", "По текущей рыночной цене", "по рынку", "#6E6A68"]
        ],
        explainer: "Облигация покупается дешевле номинала — сегодня по " + S.fmt2(inst.quote) + "% от него. На дату погашения выплачивается полный номинал. Весь доход — дисконт: разница между ценой покупки и номиналом, известная в день сделки. Купонов нет.",
        facts: [
          ["Купоны", "Нет — весь доход в дисконте"],
          ["Риск", "Кредитное качество эмитента"]
        ]
      };
    }
    const entryRub = nom * inst.quote / 100;
    const upPct = 20;
    const payoutUp = nom * (1 + inst.participation * upPct / 100);
    const partS = Math.round(inst.participation * 100) + "%";
    return {
      badge: "НОТА · ЗАЩИТА КАПИТАЛА",
      subtitle: "Нота с защитой капитала: " + inst.underlying + " · 100% номинала при любом сценарии",
      payoff: () => chartProtection(inst),
      payoffCaption: "Выплата на экспирацию в % от номинала: не ниже 100% при любом сценарии, выше S₀ — участие в росте.",
      metrics: [
        ["100%", "защита капитала"],
        [partS, "участие в росте"],
        [S.fmtSmart(inst.strike), "нач. уровень (S₀)"],
        [inst.expiry, "экспирация"],
        [S.fmtInt(nom) + " ₽", "мин. номинал"]
      ],
      exampleIntro: "Номинал " + S.fmtInt(nom) + " ₽ · вход по " + S.fmt2(inst.quote) + "% = " + S.fmtInt(entryRub) + " ₽",
      scenarios: [
        [inst.underlying + " вырос на " + upPct + "%", "Выплата " + S.fmtInt(payoutUp) + " ₽ — 100% + участие", "+" + S.fmtInt(payoutUp - entryRub) + " ₽", "#1F7A53"],
        [inst.underlying + " упал на 15%", "Сработала защита: выплата " + S.fmtInt(nom) + " ₽", "−" + S.fmtInt(entryRub - nom) + " ₽", "#E96516"]
      ],
      explainer: "Нота возвращает 100% номинала при любом сценарии. Если базовый актив на дату экспирации выше начального уровня S₀, дополнительно выплачивается " + partS + " его роста. Если актив упал — вы получаете номинал целиком.",
      facts: [
        ["Стиль", "Европейский — выплата на дату экспирации"],
        ["Риск", "Кредитный риск эмитента ноты"]
      ]
    };
  }

  function passportHTML(inst) {
    const c = buildContent(inst);
    const U = S.underlyingInfo(inst.underlying);
    return '<div class="pp-top"><div>' +
        '<div class="pp-title">' + S.displayName(inst) + '</div>' +
        '<span class="badge">' + c.badge + '</span>' +
        '<div class="pp-sub">' + c.subtitle + '</div>' +
      '</div>' +
      '<div class="quote-block">' +
        '<div class="quote-big">' + S.fmt2(inst.quote) + '%</div>' +
        '<div class="quote-sub">котировка · % от номинала</div>' +
      '</div></div>' +
      '<div class="chart-box">' +
        '<div class="chart-head"><span class="chart-title" id="chart-title"></span>' +
        (U ? '<div class="tabs"><button class="tab" id="tab-payoff">Выплата</button><button class="tab" id="tab-under">Базовый актив</button></div>' : '') +
        '</div><div id="chart"></div><div class="chart-caption" id="chart-caption"></div>' +
      '</div>' +
      '<div class="metrics">' + c.metrics.map(m => '<div class="metric"><div class="v">' + m[0] + '</div><div class="k">' + m[1] + '</div></div>').join("") + '</div>' +
      '<div class="sec"><div class="h">Пример расчёта</div><div class="intro">' + c.exampleIntro + '</div>' +
        c.scenarios.map(s => '<div class="scenario"><div class="l">' + s[0] + '</div><div class="d">' + s[1] + '</div><div class="r" style="color:' + s[3] + '">' + s[2] + '</div></div>').join("") +
        (S.isFxSensitive(inst.underlying) ? '<div style="margin-top:12px;padding:9px 13px;border-left:3px solid #E96516;background:#FBEFE3;border-radius:0 7px 7px 0;font-size:12.5px;line-height:1.5;color:#8A5A22">' + S.LEGAL.fx + '</div>' : '') + '</div>' +
      '<div class="sec"><div class="h">Как устроен продукт</div><div class="explainer">' + c.explainer + '</div>' +
        '<div class="facts">' + c.facts.map(f => '<div class="fact"><div class="k">' + f[0] + '</div><div class="v">' + f[1] + '</div></div>').join("") + '</div></div>' +
      '<div class="pp-actions"><a class="btn-pdf" href="onepager.html?id=' + encodeURIComponent(inst.id) + '&print=1">' +
        '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1 V9 M7 9 L4 6 M7 9 L10 6" stroke="#0C0A08" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12 H12" stroke="#0C0A08" stroke-width="1.6" stroke-linecap="round"/></svg>' +
        'Скачать one-pager (PDF)</a></div>';
  }

  function setMode(m, inst, c, U) {
    mode = m;
    const tp = document.getElementById("tab-payoff"), tu = document.getElementById("tab-under");
    if (tp) { tp.className = "tab" + (m === "payoff" ? " active" : ""); }
    if (tu) { tu.className = "tab" + (m === "under" ? " active" : ""); }
    document.getElementById("chart-title").textContent = m === "payoff" ? "Диаграмма выплат" : "Базовый актив — " + inst.underlying;
    document.getElementById("chart-caption").textContent = m === "payoff" ? c.payoffCaption : (U.desc + " Динамика за 12 месяцев; данные — демо.");
    document.getElementById("chart").innerHTML = m === "payoff" ? c.payoff() : chartUnderlying(inst, U);
  }

  function select(id, fromUser) {
    selected = id;
    const inst = S.INSTRUMENTS.find(r => r.id === id);
    if (!inst) return;
    document.getElementById("panel").innerHTML = passportHTML(inst);
    const c = buildContent(inst), U = S.underlyingInfo(inst.underlying);
    const tp = document.getElementById("tab-payoff"), tu = document.getElementById("tab-under");
    if (tp) tp.addEventListener("click", () => setMode("payoff", inst, c, U));
    if (tu) tu.addEventListener("click", () => setMode("under", inst, c, U));
    setMode("payoff", inst, c, U);
    document.querySelectorAll(".item").forEach(el =>
      el.classList.toggle("active", el.getAttribute("data-id") === id));
    history.replaceState(null, "", "#" + id);
    if (fromUser && window.matchMedia("(max-width: 900px)").matches) {
      document.getElementById("panel-wrap").classList.add("open");
    }
  }

  // Короткое имя в списке — без повторения базового актива (он в заголовке группы)
  function shortName(r) {
    if (r.type === "warrant") return (r.structure === "cs" ? "CS 100–150" : "CALL 100") + " · " + r.tenor;
    if (r.type === "discount") return "Дисконтная облигация";
    return "Защита капитала · участие " + Math.round(r.participation * 100) + "%";
  }

  function filtered() {
    const needle = q.trim().toLowerCase();
    return S.INSTRUMENTS.filter(r =>
      (type === "all" || r.type === type) &&
      (!needle || (r.name + " " + r.id + " " + r.underlying).toLowerCase().includes(needle)));
  }

  function itemHTML(r) {
    return '<button class="item' + (r.id === selected ? " active" : "") + '" data-id="' + r.id + '">' +
      '<div class="r1"><span class="nm">' + shortName(r) + '</span><span class="q">' + S.fmt2(r.quote) + '%</span></div>' +
    '</button>';
  }

  function render() {
    const list = filtered();
    document.getElementById("count").textContent = "инструментов: " + list.length;

    const groups = new Map();
    list.forEach(r => {
      if (!groups.has(r.underlying)) groups.set(r.underlying, []);
      groups.get(r.underlying).push(r);
    });
    const sorted = [...groups.entries()].sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0], "ru"));
    const searching = q.trim().length > 0;

    document.getElementById("list").innerHTML = sorted.length ? sorted.map(([name, items], gi) => {
      const open = searching || openGroups.has(name);
      return '<button class="group-h' + (open ? " open" : "") + '" data-g="' + name.replace(/"/g, "&quot;") + '" aria-expanded="' + open + '">' +
          '<span class="chev">▶</span><span class="name">' + name + '</span><span class="gc">' + items.length + '</span></button>' +
        '<div class="group-items' + (open ? " open" : "") + '">' + items.map(itemHTML).join("") + '</div>';
    }).join("") : '<div class="empty-list">Ничего не найдено — измените фильтр или запрос.</div>';

    document.querySelectorAll(".group-h").forEach(el => el.addEventListener("click", () => {
      const g = el.getAttribute("data-g");
      if (openGroups.has(g)) openGroups.delete(g); else openGroups.add(g);
      render();
    }));
    document.querySelectorAll(".item").forEach(el =>
      el.addEventListener("click", () => select(el.getAttribute("data-id"), true)));

    if (selected && !list.some(r => r.id === selected)) {
      selected = null;
      document.getElementById("panel").innerHTML = '<div class="placeholder">Выберите инструмент в списке слева</div>';
    }
  }

  // Фильтр по семейству
  const counts = { all: S.INSTRUMENTS.length };
  S.INSTRUMENTS.forEach(r => counts[r.type] = (counts[r.type] || 0) + 1);
  document.getElementById("kinds").innerHTML = ["all", "warrant", "discount", "protection"].map(t =>
    '<button class="kf' + (t === type ? " active" : "") + '" data-k="' + t + '">' +
    (t === "all" ? "Все" : TYPE_LABEL[t]) + '<span class="n">' + (counts[t] || 0) + '</span></button>').join("");
  document.querySelectorAll(".kf").forEach(b => b.addEventListener("click", () => {
    type = b.getAttribute("data-k");
    document.querySelectorAll(".kf").forEach(x => x.classList.toggle("active", x === b));
    render();
  }));
  document.getElementById("search").addEventListener("input", e => { q = e.target.value; render(); });
  document.getElementById("panel-close").addEventListener("click", () =>
    document.getElementById("panel-wrap").classList.remove("open"));

  // Deep-link: #id инструмента → открыть его группу
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) {
    const r = S.INSTRUMENTS.find(x => x.id === hash);
    if (r) { selected = hash; openGroups.add(r.underlying); if (type !== "all" && r.type !== type) type = "all"; }
  }
  render();
  if (selected) select(selected, false);

  // ── Полоса-«пульс»: бесконечно рисующаяся оранжевая линия (декор, без данных) ──
  (function pulse() {
    const host = document.getElementById("ticker");
    if (!host) return;
    const OR = "#EE7D1B", NS = "http://www.w3.org/2000/svg";
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const svg = document.createElementNS(NS, "svg");
    svg.setAttribute("aria-hidden", "true");
    host.appendChild(svg);
    let W = 0, H = 0, N = 0, DX = 0, pts = [], path, halo, tip, acc = 0, prev = 0;

    function build() {
      W = host.clientWidth || 800; H = host.clientHeight || 54;
      svg.setAttribute("viewBox", "0 0 " + W + " " + H);
      N = Math.max(24, Math.round(W / 8)); DX = W / (N - 1);
      let g = "";
      for (let gy = 18; gy < H; gy += 18) g += '<line x1="0" y1="' + gy + '" x2="' + W + '" y2="' + gy + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
      if (!pts.length) { let v = 0.55; for (let i = 0; i < N; i++) { v = Math.min(0.85, Math.max(0.15, v + (Math.random() - 0.5) * 0.1)); pts.push(v); } }
      else { const last = pts[pts.length - 1] || 0.5; while (pts.length < N) pts.unshift(last); pts = pts.slice(-N); }
      svg.innerHTML = g +
        '<path id="pl-line" fill="none" stroke="' + OR + '" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 7px rgba(238,125,27,0.5))"/>' +
        '<circle id="pl-halo" r="9" fill="rgba(238,125,27,0.22)"/><circle id="pl-tip" r="3.4" fill="' + OR + '"/>';
      path = svg.querySelector("#pl-line"); halo = svg.querySelector("#pl-halo"); tip = svg.querySelector("#pl-tip");
      draw();
    }
    function draw() {
      let d = "M";
      for (let i = 0; i < N; i++) d += (i ? " L" : "") + (i * DX).toFixed(1) + " " + (8 + pts[i] * (H - 16)).toFixed(1);
      path.setAttribute("d", d);
      const ty = 8 + pts[N - 1] * (H - 16);
      tip.setAttribute("cx", W - 1); tip.setAttribute("cy", ty);
      halo.setAttribute("cx", W - 1); halo.setAttribute("cy", ty);
    }
    build();
    if (reduce) { tip.setAttribute("opacity", 0); halo.setAttribute("opacity", 0); return; }
    let rw = 0;
    window.addEventListener("resize", () => { clearTimeout(rw); rw = setTimeout(build, 150); });
    function fr(now) {
      if (!prev) prev = now;
      acc += now - prev; prev = now;
      while (acc > 42) { acc -= 42; const nv = pts[N - 1] + (Math.random() - 0.5) * 0.1 - (pts[N - 1] - 0.5) * 0.03; pts.push(Math.min(0.88, Math.max(0.12, nv))); pts.shift(); }
      draw();
      requestAnimationFrame(fr);
    }
    requestAnimationFrame(fr);
  })();
</script>
