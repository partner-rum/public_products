<style>
  :root {
    --canvas: #0B0C10; --card: #14161C; --panel-2: #191B22; --tile: rgba(255,255,255,0.045);
    --black: #1A1919;
    --ink: #F2F3F7; --hushed: rgba(242,243,247,0.64); --faint: rgba(242,243,247,0.42);
    --border: rgba(255,255,255,0.11); --border-soft: rgba(255,255,255,0.07);
    --solar: #EE7D1B; --solar-l: #F58E33; --up: #55C08A; --down: #EE7D1B;
    --f-body: 'Onest', system-ui, sans-serif; --f-mono: 'JetBrains Mono', Consolas, monospace; --display: 'Rubik', 'Onest', system-ui, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--ink); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 4px; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 44px 56px; }

  .nav { position: sticky; top: 0; z-index: 30; background: rgba(11,12,16,0.82); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav-in { max-width: 1180px; margin: 0 auto; padding: 0 44px; height: 62px; display: flex; align-items: center; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; } .brand-name { font-size: 14.5px; font-weight: 600; }
  .topnav { margin-left: auto; display: flex; align-items: center; gap: 22px; font-size: 14px; font-weight: 500; }
  .topnav a { color: var(--hushed); transition: color .2s; } .topnav a:hover { color: var(--ink); }
  .topnav a[aria-current="page"] { color: var(--ink); font-weight: 600; }
  .btn-solar { background: var(--solar); color: #0C0A08 !important; border-radius: 6px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 7px; transition: background .3s; }
  .btn-solar:hover { background: var(--solar-l); }

  .crumbs { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--hushed); padding: 24px 0 22px; }
  .crumbs .sep { color: var(--faint); } .crumbs .here { color: var(--ink); font-weight: 500; }

  .head { margin-bottom: 6px; }
  .head-row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  h1 { margin: 0; font-family: var(--display); font-size: 34px; font-weight: 400; letter-spacing: -0.02em; }
  .intro { margin-top: 10px; font-size: 15px; line-height: 1.6; color: var(--hushed); max-width: 680px; }

  /* Переключатель выпусков (архив) */
  .pick { position: relative; }
  .pick-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 13px; font-family: var(--f-body); font-size: 14px; color: var(--ink); cursor: pointer; }
  .pick-btn:hover { border-color: rgba(255,255,255,0.22); }
  .pick-btn .lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--faint); }
  .pick-btn .cv { color: var(--hushed); transition: transform .25s var(--ease); }
  .pick.open .cv { transform: rotate(180deg); }
  .pick-menu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 40; min-width: 320px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 18px 44px rgba(0,0,0,0.5); padding: 6px; display: none; }
  .pick.open .pick-menu { display: block; }
  .pick-mh { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); padding: 8px 12px 6px; }
  .pick-i { display: block; width: 100%; text-align: left; background: none; border: none; border-radius: 8px; padding: 10px 12px; cursor: pointer; font-family: var(--f-body); color: var(--ink); }
  .pick-i:hover { background: rgba(255,255,255,0.05); }
  .pick-i.active { background: rgba(255,255,255,0.09); }
  .pick-i .d { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .pick-i .d .t { font-size: 14.5px; font-weight: 600; }
  .pick-i .d .c { font-family: var(--f-mono); font-size: 11px; color: var(--faint); white-space: nowrap; }
  .pick-i .s { font-size: 12px; color: var(--hushed); margin-top: 3px; line-height: 1.4; }

  .qual { margin: 16px 0 4px; display: inline-flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 15px; font-size: 12.5px; color: var(--hushed); }

  .layout { display: grid; grid-template-columns: 300px minmax(0,1fr); gap: 40px; align-items: start; margin-top: 24px; }

  .toc { position: sticky; top: 86px; }
  .toc-h { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
  .toc-sec { font-size: 12px; font-weight: 600; margin: 16px 0 6px; }
  .toc-i { display: flex; gap: 12px; align-items: baseline; width: 100%; text-align: left; background: none; border: none; cursor: pointer; padding: 7px 8px; border-radius: 8px; font-family: var(--f-body); color: var(--ink); }
  .toc-i:hover { background: rgba(255,255,255,0.05); }
  .toc-i.active { background: #262A33; color: var(--ink); }
  .toc-i.active .num, .toc-i.active .mv { color: rgba(255,255,255,0.72); }
  .toc-i .num { font-family: var(--f-mono); font-size: 11px; color: var(--faint); flex: none; width: 20px; }
  .toc-i .tx { flex: 1; min-width: 0; }
  .toc-i .nm { font-size: 13.5px; line-height: 1.3; }
  .toc-i .mv { font-family: var(--f-mono); font-size: 11px; color: var(--fc); margin-top: 2px; }

  .art-num { font-family: var(--f-mono); font-size: 13px; color: var(--fc); letter-spacing: 0.05em; }
  .art-kind { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); margin-left: 10px; }
  .art-title { margin: 12px 0 6px; font-family: var(--display); font-size: 40px; font-weight: 400; letter-spacing: -0.025em; line-height: 1.08; max-width: 640px; }
  .art-un { font-size: 15px; color: var(--hushed); margin-bottom: 8px; }
  .art-bar { width: 60px; height: 4px; background: var(--fc); margin: 16px 0 24px; }

  .nextprev { display: flex; justify-content: space-between; gap: 14px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 18px; }
  .np { background: none; border: none; cursor: pointer; font-family: var(--f-body); color: var(--hushed); text-align: left; padding: 6px 0; max-width: 46%; }
  .np:hover { color: var(--ink); } .np.r { text-align: right; }
  .np .l { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
  .np .n { font-size: 14.5px; margin-top: 3px; }
  .np[disabled] { visibility: hidden; }

  .foot { margin-top: 30px; font-size: 12px; line-height: 1.5; color: var(--faint); max-width: 700px; }
  .art-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 2px; }
  .art-meta { display: flex; align-items: baseline; }
  body.client .topnav, body.client .crumbs, body.client .head, body.client .toc, body.client .nextprev, body.client .art-tools, body.client .df-sell { display: none !important; }
  body.client .layout { grid-template-columns: 1fr; margin-top: 8px; }
  body.client .qual { margin-top: 22px; }

  @media (max-width: 900px) {
    .wrap { padding: 0 18px 40px; } .nav-in { padding-left: 18px; padding-right: 18px; }
    .layout { grid-template-columns: 1fr; gap: 20px; } .toc { position: static; }
    .art-title { font-size: 28px; } .pick-menu { min-width: 260px; }
  }
  @media (max-width: 860px) {
    .nav-in { height: auto; flex-wrap: wrap; padding: 12px 18px; row-gap: 10px; }
    .topnav { margin-left: 0; width: 100%; gap: 16px; font-size: 13.5px; }
  }
  @media print { .nav, .crumbs, .pick, .nextprev { display: none !important; } body { background: #fff; } .toc { display: none; } .layout { grid-template-columns: 1fr; } }
</style>

<body>

        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 7 H12 M8 3 L12 7 L8 11" stroke="#0C0A08" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>

<div class="wrap">
  <div class="crumbs"><a href="index.html">Главная</a><span class="sep">/</span><span class="here">Дайджест</span></div>

  <div class="head">
    <div class="head-row">
      <h1>Дайджест</h1>
      <div class="pick" id="pick">
        <button class="pick-btn" id="pick-btn" aria-haspopup="true" aria-expanded="false">
          <span class="lbl">Выпуск</span><span id="pick-date"></span>
          <svg class="cv" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5 L7 9 L11 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

      </div>

  </div>

  <div class="layout">

    <main>
      <article id="article"></article>
      <div class="nextprev"><button class="np" id="prev"></button><button class="np r" id="next"></button></div>
      <div class="foot">Материалы дайджеста носят информационный характер и не являются офертой. Параметры выпусков ориентировочные; финальные условия фиксируются в спецификации инструмента.</div>

<script src="data/lib.js?v=fx4"></script>

<script src="share.js?v=5"></script>
<script>
  const A = window.DIGEST_ARCHIVE;
  if (new URLSearchParams(location.search).get("view") === "client") document.body.classList.add("client");
  let issue = null, order = [];

  function num(id) { return String(order.findIndex(i => i.id === id) + 1).padStart(2, "0"); }

  function renderPicker() {
    document.getElementById("pick-list").innerHTML = A.issues.map(iss =>
      '<button class="pick-i' + (iss.id === issue.id ? " active" : "") + '" data-iss="' + iss.id + '">' +
        '<div class="d"><span class="t">' + iss.label + '</span><span class="c">' + iss.ideas.length + ' идей</span></div>' +
        '<div class="s">' + iss.summary + '</div>' +
      '</button>').join("");
    document.querySelectorAll(".pick-i").forEach(el => el.addEventListener("click", () => {
      setPickerOpen(false);
      selectIssue(el.getAttribute("data-iss"), null);
    }));
  }

  function buildTOC() {
    document.getElementById("toc").innerHTML = A.sections.map(s => {
      const items = issue.ideas.filter(i => i.family === s.key);
      if (!items.length) return "";
      return '<div class="toc-sec" style="color:' + s.color + '">' + s.label + '</div>' +
        items.map(i => '<button class="toc-i" data-id="' + i.id + '" style="--fc:' + DF.colorOf(i.family) + '">' +
          '<span class="num">' + num(i.id) + '</span>' +
          '<span class="tx"><span class="nm">' + i.name + '</span><br><span class="mv">' + i.metric.v + ' · ' + i.metric.k + '</span></span>' +
        '</button>').join("");
    }).join("");
    document.querySelectorAll(".toc-i").forEach(el => el.addEventListener("click", () => show(el.getAttribute("data-id"))));
  }

  function show(id) {
    const i = order.find(x => x.id === id) || order[0];
    const c = DF.colorOf(i.family);
    const art = document.getElementById("article");
    art.style.setProperty("--fc", c);
    art.innerHTML =
      '<div class="art-head"><div class="art-meta"><span class="art-num">' + num(i.id) + '</span><span class="art-kind">' + i.kind + '</span></div><span class="art-tools" id="art-tools"></span></div>' +
      '<h2 class="art-title">' + i.name + '</h2>' +
      '<div class="art-un">' + i.underlying + '</div>' +
      '<div class="art-bar"></div>' + DF.detailBody(i);
    const shHost = document.getElementById("art-tools");
    if (shHost && window.Share) {
      const prodUrl = location.origin + location.pathname + "?view=client#" + issue.id + "/" + i.id;
      const p = i.p || {};
      const params = [["Цена входа", p.price], ["Потенциал", p.upside], ["Защита", p.protection]];
      Share.attach(shHost, { url: prodUrl, title: i.name, name: i.name, pitch: i.teaser, params: params });
    }
    document.querySelectorAll(".toc-i").forEach(el => el.classList.toggle("active", el.getAttribute("data-id") === i.id));

    const idx = order.findIndex(x => x.id === i.id);
    const prev = document.getElementById("prev"), next = document.getElementById("next");
    if (idx > 0) { prev.disabled = false; prev.dataset.id = order[idx - 1].id; prev.innerHTML = '<div class="l">← Предыдущая</div><div class="n">' + order[idx - 1].name + '</div>'; } else { prev.disabled = true; prev.innerHTML = ""; }
    if (idx < order.length - 1) { next.disabled = false; next.dataset.id = order[idx + 1].id; next.innerHTML = '<div class="l">Следующая →</div><div class="n">' + order[idx + 1].name + '</div>'; } else { next.disabled = true; next.innerHTML = ""; }

    history.replaceState(null, "", "#" + issue.id + "/" + i.id);
  }

  function selectIssue(issueId, ideaId) {
    issue = A.issues.find(x => x.id === issueId) || A.issues[0];
    order = [];
    A.sections.forEach(s => issue.ideas.filter(i => i.family === s.key).forEach(i => order.push(i)));
    document.getElementById("pick-date").textContent = issue.label;
    document.getElementById("intro").textContent = issue.intro;
    document.getElementById("qual").textContent = issue.qualNote;
    renderPicker();
    buildTOC();
    show(order.find(i => i.id === ideaId) ? ideaId : order[0].id);
    window.scrollTo({ top: 0, behavior: "auto" });
  }

  function setPickerOpen(open) {
    document.getElementById("pick").classList.toggle("open", open);
    document.getElementById("pick-btn").setAttribute("aria-expanded", open ? "true" : "false");
  }
  document.getElementById("pick-btn").addEventListener("click", e => { e.stopPropagation(); setPickerOpen(!document.getElementById("pick").classList.contains("open")); });
  document.addEventListener("click", () => setPickerOpen(false));
  document.addEventListener("keydown", e => { if (e.key === "Escape") setPickerOpen(false); });
  document.getElementById("prev").addEventListener("click", e => { show(e.currentTarget.dataset.id); window.scrollTo({ top: 0, behavior: "smooth" }); });
  document.getElementById("next").addEventListener("click", e => { show(e.currentTarget.dataset.id); window.scrollTo({ top: 0, behavior: "smooth" }); });

  // Deep-link: #issueId  или  #issueId/ideaId
  const parts = decodeURIComponent(location.hash.slice(1)).split("/");
  const startIssue = A.issues.find(x => x.id === parts[0]) ? parts[0] : A.issues[0].id;
  selectIssue(startIssue, parts[1] || null);
</script>
