<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Дайджест — инвестиционные идеи недели</title>
<meta name="description" content="Дайджест инвестиционных идей: гипотеза, рыночная ситуация, факторы и параметры выпуска по каждому продукту.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #1B1D22; --night2: #26292F;
    --paper: #F1F0EC; --card: #FBFBF9;
    --ink: #1F2125; --fog: #67696E;
    --hair: #DEDCD6; --hair2: #E9E7E1;
    --gold: #C09246; --gold-dark: #A87C33;
    --spruce: #2E6E56; --steel: #33608C; --amber: #B3801F;
    --f-disp: 'Prata', Georgia, serif;
    --f-body: 'Onest', system-ui, sans-serif;
    --f-mono: 'JetBrains Mono', Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 44px 64px; }

  .topbar { background: var(--night); color: #E9EDF2; }
  .topbar-in { max-width: 1080px; margin: 0 auto; padding: 18px 44px; display: flex; justify-content: space-between; align-items: center; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-name { font-size: 15px; font-weight: 600; }
  .topnav { display: flex; gap: 26px; font-size: 14px; font-weight: 500; }
  .topnav a { color: #B4B6BB; }
  .topnav a:hover { color: #FFFFFF; }

  .crumbs { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--fog); padding: 26px 0 28px; }
  .crumbs a:hover { color: var(--ink); }
  .crumbs .sep { color: #C0BFBA; }
  .crumbs .here { color: var(--ink); font-weight: 500; }

  .head { max-width: 760px; margin-bottom: 14px; }
  .head-row { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  h1 { margin: 0; font-family: var(--f-disp); font-size: 38px; font-weight: 400; letter-spacing: 0.002em; }
  .date { font-family: var(--f-mono); font-size: 13px; color: var(--fog); }
  .intro { margin-top: 12px; font-size: 15px; line-height: 1.6; color: #43454A; text-wrap: pretty; }
  .qual { margin: 22px 0 34px; display: inline-flex; align-items: center; gap: 10px; background: #F4EDE0; border: 1px solid #E3D5B8; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #6E5A2E; }

  /* Идея */
  .idea { background: var(--card); border: 1px solid var(--hair); border-top: 3px solid var(--fc); border-radius: 14px; padding: 30px 32px; margin-bottom: 26px; }
  .idea-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 6px; }
  .idea-kind { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fc); }
  .idea h2 { margin: 6px 0 4px; font-family: var(--f-disp); font-size: 25px; font-weight: 400; letter-spacing: 0.002em; }
  .idea-under { font-size: 14px; color: var(--fog); }
  .hypothesis { margin: 18px 0 22px; padding: 16px 20px; background: var(--paper); border-radius: 10px; font-family: var(--f-disp); font-size: 17px; line-height: 1.55; color: #2E3036; max-width: 720px; text-wrap: pretty; }
  .hypothesis .k { display: block; font-family: var(--f-mono); font-size: 10.5px; font-style: normal; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 7px; }

  .idea-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; align-items: start; }
  .block { margin-bottom: 20px; }
  .block .k { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 9px; }
  .block p { margin: 0; font-size: 14.5px; line-height: 1.65; color: #43454A; text-wrap: pretty; }
  .block ul { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; }
  .block li { font-size: 14px; line-height: 1.55; color: #43454A; }
  .block li::marker { color: var(--fc); }

  .side { display: flex; flex-direction: column; gap: 10px; }
  .side-chart { background: var(--paper); border-radius: 10px; padding: 14px 16px 10px; }
  .side-chart .cap { font-size: 11.5px; color: #8E8F92; margin-top: 8px; line-height: 1.45; }
  .param { background: var(--paper); border-radius: 10px; padding: 11px 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .param .k { font-size: 13px; color: var(--fog); }
  .param .v { font-family: var(--f-mono); font-size: 13.5px; text-align: right; }
  .payout { margin-top: 4px; font-size: 13px; line-height: 1.55; color: var(--fog); }

  .foot-note { margin-top: 8px; font-size: 12.5px; line-height: 1.55; color: #8E8F92; max-width: 640px; }

  @media (max-width: 900px) {
    .wrap { padding: 0 20px 48px; }
    .topbar-in { padding: 16px 20px; }
    .topnav { display: none; }
    h1 { font-size: 30px; }
    .idea { padding: 22px 20px; }
    .idea-grid { grid-template-columns: 1fr; }
  }
  @media print {
    .topbar, .crumbs { display: none !important; }
    body { background: #fff; }
    .idea { border: 1px solid #CFCFCF; break-inside: avoid; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-in">
    <a class="brand" href="index.html" aria-label="На главную">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <path d="M13 1 L15.6 10.4 L25 13 L15.6 15.6 L13 25 L10.4 15.6 L1 13 L10.4 10.4 Z" fill="#C09246"/>
      </svg>
      <span class="brand-name">Структурные продукты</span>
    </a>
    <nav class="topnav">
      <a href="index.html#families">Все типы продуктов</a>
      <a href="board.html?type=warrant">Доска инструментов</a>
    </nav>
  </div>
</header>

<div class="wrap">

  <div class="crumbs">
    <a href="index.html">Главная</a>
    <span class="sep">/</span>
    <span class="here">Дайджест</span>
  </div>

  <div class="head">
    <div class="head-row">
      <h1>Дайджест</h1>
      <span class="date" id="digest-date"></span>
    </div>
    <div class="intro" id="digest-intro"></div>
  </div>

  <div class="qual" id="digest-qual">
    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M7 0 L8.4 5.6 L14 7 L8.4 8.4 L7 14 L5.6 8.4 L0 7 L5.6 5.6 Z" fill="#B3801F"/></svg>
    <span></span>
  </div>

  <div id="ideas"></div>

  <div class="foot-note">Материалы дайджеста носят информационный характер и не являются офертой. Параметры выпусков — ориентировочные; финальные условия фиксируются в спецификации инструмента.</div>

</div>

<script src="data/digest.js"></script>
<script>
  const D = window.DIGEST;
  const FAM = {
    warrant:    { color: "#B3801F" },
    protection: { color: "#33608C" },
    discount:   { color: "#2E6E56" }
  };
  const MONO = 'font-family="JetBrains Mono, monospace"';

  document.getElementById("digest-date").textContent = D.date;
  document.getElementById("digest-intro").textContent = D.intro;
  document.querySelector("#digest-qual span").textContent = D.qualNote;

  // Мини-диаграмма выплаты идеи. Типы: callcap (рост до потолка), digital (купон при барьере).
  function payoffSvg(p, color) {
    const W = 300, H = 130, PAD = 16;
    const x = t => PAD + t * (W - PAD * 2);
    const y = t => PAD + t * (H - PAD * 2);
    let el = "";
    if (p.type === "callcap") {
      const line = "M" + x(0) + " " + y(0.85) + " L" + x(0.38) + " " + y(0.85) + " L" + x(0.74) + " " + y(0.15) + " L" + x(1) + " " + y(0.15);
      el = '<line x1="' + PAD + '" y1="' + y(0.15) + '" x2="' + (W - PAD) + '" y2="' + y(0.15) + '" stroke="#D8DDD4" stroke-width="1" stroke-dasharray="2 4"/>' +
        '<path d="' + line + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
        '<rect x="' + (x(0.74) - 3.5) + '" y="' + (y(0.15) - 3.5) + '" width="7" height="7" transform="rotate(45 ' + x(0.74) + ' ' + y(0.15) + ')" fill="' + color + '"/>' +
        '<text x="' + (W - PAD) + '" y="' + (y(0.15) - 8) + '" text-anchor="end" fill="#5C6875" font-size="10.5" ' + MONO + '>макс. +' + p.capPct + '%</text>' +
        '<text x="' + x(0.19) + '" y="' + (y(0.85) + 14) + '" text-anchor="middle" fill="#8E8F92" font-size="10.5" ' + MONO + '>премия ' + String(p.premiumPct).replace(".", ",") + '%</text>';
    } else if (p.type === "digital") {
      const base = y(0.62), up = y(0.18), bx = x(0.56);
      el = '<line x1="' + PAD + '" y1="' + base + '" x2="' + (W - PAD) + '" y2="' + base + '" stroke="#D8DDD4" stroke-width="1" stroke-dasharray="2 4"/>' +
        '<text x="' + PAD + '" y="' + (base + 14) + '" fill="#8E8F92" font-size="10.5" ' + MONO + '>номинал 100%</text>' +
        '<path d="M' + PAD + ' ' + base + ' L' + bx + ' ' + base + ' L' + bx + ' ' + up + ' L' + (W - PAD) + ' ' + up + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
        '<rect x="' + (bx - 3.5) + '" y="' + (up - 3.5) + '" width="7" height="7" transform="rotate(45 ' + bx + ' ' + up + ')" fill="' + color + '"/>' +
        '<text x="' + (W - PAD) + '" y="' + (up - 8) + '" text-anchor="end" fill="#5C6875" font-size="10.5" ' + MONO + '>барьер +' + p.barrierPct + '% → купон ' + p.couponPct + '%</text>';
    }
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' + el + '</svg>';
  }

  document.getElementById("ideas").innerHTML = D.ideas.map(i => {
    const c = (FAM[i.family] || FAM.warrant).color;
    return '<article class="idea" style="--fc:' + c + '">' +
      '<div class="idea-top"><div>' +
        '<div class="idea-kind">Идея · ' + i.kind + '</div>' +
        '<h2>' + i.name + '</h2>' +
        '<div class="idea-under">' + i.underlying + '</div>' +
      '</div></div>' +
      '<div class="hypothesis"><span class="k">Гипотеза</span>' + i.hypothesis + '</div>' +
      '<div class="idea-grid">' +
        '<div>' +
          '<div class="block"><div class="k">Рыночная ситуация</div><p>' + i.situation + '</p></div>' +
          '<div class="block"><div class="k">Факторы</div><ul>' + i.factors.map(f => '<li>' + f + '</li>').join("") + '</ul></div>' +
          (i.conclusion ? '<div class="block"><div class="k">Вывод</div><p>' + i.conclusion + '</p></div>' : '') +
          '<div class="block"><div class="k">Как заработать</div><p>' + i.how + '</p></div>' +
        '</div>' +
        '<div class="side">' +
          '<div class="side-chart">' + payoffSvg(i.payoff, c) + '<div class="cap">' + i.payout + '</div></div>' +
          i.params.map(p => '<div class="param"><span class="k">' + p[0] + '</span><span class="v">' + p[1] + '</span></div>').join("") +
        '</div>' +
      '</div>' +
    '</article>';
  }).join("");
</script>
</body>
</html>
